rules:
  - id: java-servlet-xss-sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into response
    metadata:
      provenance: https://github.com/semgrep/semgrep-rules/blob/develop/java/lang/security/audit/xss/no-direct-response-writer.yaml
    languages:
      - java
    mode: taint
    pattern-sanitizers:
      - pattern-either:
          - pattern: Encode.forHtml(...)
          - pattern: (PolicyFactory $POLICY).sanitize(...)
          - pattern: (AntiSamy $AS).scan(...)
          - pattern: JSoup.clean(...)
          - pattern: HtmlUtils.htmlEscape(...)
          - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(...)
          - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(...)

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: |
                  (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (HttpServletResponse $RESPONSE).sendError($CODE, $UNTRUSTED)
              - pattern: |
                  (java.io.PrintWriter $WRITER).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (PrintWriter $WRITER).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (javax.servlet.ServletOutputStream $WRITER).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (ServletOutputStream $WRITER).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (jakarta.servlet.jsp.JspWriter $WRITER).$WRITE(..., $UNTRUSTED, ...)
              # JSF response writer/stream sinks
              - pattern: |
                  (javax.faces.context.ResponseWriter $WRITER).write($UNTRUSTED, ...)
              - pattern: |
                  (javax.faces.context.ResponseStream $STREAM).write($UNTRUSTED, ...)
              - pattern: |
                  (jakarta.faces.context.ResponseWriter $WRITER).write($UNTRUSTED, ...)
              - pattern: |
                  (jakarta.faces.context.ResponseStream $STREAM).write($UNTRUSTED, ...)
              # Apache HttpComponents response entity sinks
              - pattern: |
                  (org.apache.hc.core5.http.HttpEntityContainer $CONTAINER).setEntity($UNTRUSTED)
              - pattern: |
                  (org.apache.http.HttpResponse $RESPONSE).setEntity($UNTRUSTED)
              - pattern: |
                  org.apache.http.util.EntityUtils.updateEntity($RESPONSE, $UNTRUSTED)
              # Jenkins FormValidation respond
              - pattern: |
                  hudson.util.FormValidation.respond($KIND, $UNTRUSTED)
          - focus-metavariable: $UNTRUSTED
      # Jenkins FormValidation HTML markup sinks
      - patterns:
          - pattern: |
              hudson.util.FormValidation.$METHOD($UNTRUSTED, ...)
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(errorWithMarkup|okWithMarkup|warningWithMarkup)$
          - focus-metavariable: $UNTRUSTED
      # Jenkins Stapler HTML response sinks
      - patterns:
          - pattern: |
              org.kohsuke.stapler.HttpResponses.$METHOD($UNTRUSTED)
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(html|literalHtml)$
          - focus-metavariable: $UNTRUSTED
