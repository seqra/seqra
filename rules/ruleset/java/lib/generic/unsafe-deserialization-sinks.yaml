rules:
  - id: jackson-unsafe-deserialization
    options:
      lib: true
    severity: NOTE
    message: Jackson deserialization of JSON to Java objects with default typing, this can lead to RCE
    metadata:
      provenance: https://semgrep.dev/r/gitlab.java_deserialization_rule-JacksonUnsafeDeserialization
    languages:
      - java
    patterns:
      - pattern-either:
        # TODO: support type annotations for fields and locals
        # - patterns:
        #   - pattern-either:
        #     - pattern: |
        #         @JsonTypeInfo(use = com.fasterxml.jackson.annotation.JsonTypeInfo.Id.CLASS,...)
        #         $TYPE $VAR;
        #     - pattern: |
        #         @JsonTypeInfo(use = com.fasterxml.jackson.annotation.JsonTypeInfo.Id.MINIMAL_CLASS,...)
        #         $TYPE $VAR;
        #   - metavariable-regex:
        #       metavariable: $TYPE
        #       regex: (Object|Serializable|Comparable|Cloneable|Closeable|AutoCloseable|Handler|Referenceable|DataSource)
        - pattern: |
            (com.fasterxml.jackson.databind.ObjectMapper $OM).enableDefaultTyping(...);
        - pattern: (com.fasterxml.jackson.databind.ObjectMapper.DefaultTypeResolverBuilder $RB).init(com.fasterxml.jackson.annotation.JsonTypeInfo.Id.CLASS, ...);
        - pattern: (com.fasterxml.jackson.databind.ObjectMapper.DefaultTypeResolverBuilder $RB).init(com.fasterxml.jackson.annotation.JsonTypeInfo.Id.MINIMAL_CLASS, ...);
        # TODO: support $TYPE.class
        # - patterns:
        #     - pattern: (com.fasterxml.jackson.databind.ObjectMapper $OM).activateDefaultTyping($B.builder(...). ... .allowIfBaseType($TYPE.class). ... );
        #     - metavariable-regex:
        #         metavariable: $TYPE
        #         regex: (Object|Serializable|Comparable|Cloneable|Closeable|AutoCloseable|Handler|Referenceable|DataSource)
        - pattern: (com.fasterxml.jackson.databind.ObjectMapper $OM).activateDefaultTyping((com.fasterxml.jackson.databind.jsontype.impl.LaissezFaireSubTypeValidator $LFSTV), ObjectMapper.DefaultTyping.EVERYTHING);
      - pattern-not-inside: |
          (com.fasterxml.jackson.databind.ObjectMapper $OM).enable(MapperFeature.BLOCK_UNSAFE_POLYMORPHIC_BASE_TYPES); ...
      - pattern-not-inside: |
          JsonMapper.builder(...).enable(MapperFeature.BLOCK_UNSAFE_POLYMORPHIC_BASE_TYPES).build(); ...

  - id: yaml-unsafe-deserialization-sink
    options:
      lib: true
    severity: NOTE
    message: Parsing of untrusted data with org.yaml.snakeyaml.Yaml() constructed with no arguments
    metadata:
      provenance: https://github.com/semgrep/semgrep-rules/blob/develop/java/lang/security/use-snakeyaml-constructor.yaml
    languages:
      - java
    patterns:
      - pattern: |
          $Y = new org.yaml.snakeyaml.Yaml();
          ...
          $Y.load($YAML);

  - id: java-unsafe-deserialization-sinks
    options:
      lib: true
    severity: NOTE
    message: Deserialization of untrusted data can lead to remote code execution.
    metadata:
      cwe: CWE-502
    languages:
      - java
    mode: taint
    pattern-sinks:
      # Caucho Hessian - constructor sinks (practical detection for Argument[this])
      - pattern: new com.caucho.hessian.io.HessianInput($SINK)
      - pattern: new com.caucho.hessian.io.Hessian2Input($SINK)
      # ANALYZER LIMITATION: Hessian2StreamingInput takes Hessian2Input as arg, not InputStream.
      # Taint does not propagate through new Hessian2Input(is) to the Hessian2Input object.
      # TODO: Re-enable when constructor taint propagation summaries are added.
      # - pattern: new com.caucho.hessian.io.Hessian2StreamingInput($SINK)
      # Caucho Burlap - constructor sink
      - pattern: new com.caucho.burlap.io.BurlapInput($SINK)
      # Alibaba/Dubbo repackaged Hessian - constructor sinks
      - pattern: new com.alibaba.com.caucho.hessian.io.HessianInput($SINK)
      - pattern: new com.alibaba.com.caucho.hessian.io.Hessian2Input($SINK)
      # ANALYZER LIMITATION: Same as Caucho Hessian2StreamingInput above.
      # TODO: Re-enable when constructor taint propagation summaries are added.
      # - pattern: new com.alibaba.com.caucho.hessian.io.Hessian2StreamingInput($SINK)
      # ANALYZER LIMITATION: Argument[this] method sinks require taint propagation through constructors.
      # Covered by constructor patterns above for practical detection.
      # TODO: Re-enable when constructor taint propagation summaries are added for Hessian/Burlap.
      # - pattern: (com.caucho.hessian.io.AbstractHessianInput $SINK).readObject(...)
      # - pattern: (com.caucho.hessian.io.Hessian2StreamingInput $SINK).readObject(...)
      # - pattern: (com.caucho.burlap.io.BurlapInput $SINK).readObject(...)
      # - pattern: (com.alibaba.com.caucho.hessian.io.AbstractHessianInput $SINK).readObject(...)
      # - pattern: (com.alibaba.com.caucho.hessian.io.Hessian2StreamingInput $SINK).readObject(...)
      # json-io (CedarSoftware) - constructor + static method
      - pattern: new com.cedarsoftware.util.io.JsonReader($SINK, ...)
      - patterns:
          - pattern: com.cedarsoftware.util.io.JsonReader.jsonToJava($SINK, ...)
          - focus-metavariable: $SINK
      # ANALYZER LIMITATION: Argument[this] — covered by constructor pattern above.
      # TODO: Re-enable when constructor taint propagation summaries are added for JsonReader.
      # - pattern: (com.cedarsoftware.util.io.JsonReader $SINK).readObject(...)
      # YamlBeans - constructor sink
      - pattern: new com.esotericsoftware.yamlbeans.YamlReader($SINK, ...)
      # ANALYZER LIMITATION: Argument[this] — covered by constructor pattern above.
      # TODO: Re-enable when constructor taint propagation summaries are added for YamlReader.
      # - pattern: (com.esotericsoftware.yamlbeans.YamlReader $SINK).read(...)
      # Java Beans XMLDecoder - constructor sink
      - pattern: new java.beans.XMLDecoder($SINK, ...)
      # ANALYZER LIMITATION: Argument[this] — covered by constructor pattern above.
      # TODO: Re-enable when constructor taint propagation summaries are added for XMLDecoder.
      # - pattern: (java.beans.XMLDecoder $SINK).readObject(...)
      # Apache Commons Lang SerializationUtils
      - patterns:
          - pattern: org.apache.commons.lang.SerializationUtils.deserialize($SINK)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: org.apache.commons.lang3.SerializationUtils.deserialize($SINK)
          - focus-metavariable: $SINK
      # Castor XML Unmarshaller (Argument[0..1])
      - patterns:
          - pattern: (org.exolab.castor.xml.Unmarshaller $X).unmarshal($SINK, ...)
          - focus-metavariable: $SINK
      - patterns:
          - pattern: org.exolab.castor.xml.Unmarshaller.unmarshal($SINK, ...)
          - focus-metavariable: $SINK
      # JYaml (org.ho.yaml) - static methods
      - patterns:
          - pattern: org.ho.yaml.Yaml.$METHOD($SINK, ...)
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(load|loadStream|loadStreamOfType|loadType)$
          - focus-metavariable: $SINK
      # JYaml (org.ho.yaml) - instance methods
      - patterns:
          - pattern: (org.ho.yaml.YamlConfig $X).$METHOD($SINK, ...)
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(load|loadStream|loadStreamOfType|loadType)$
          - focus-metavariable: $SINK
      # Jabsorb JSON-RPC deserializer
      - patterns:
          - pattern: (org.jabsorb.JSONSerializer $X).fromJSON($SINK)
          - focus-metavariable: $SINK
