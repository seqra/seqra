rules:
  - id: java-logging-sinks
    options:
      lib: true
    severity: NOTE
    message: Logging the data
    metadata:
      provenance: https://semgrep.dev/r/gitlab.find_sec_bugs.CRLF_INJECTION_LOGS-1
    languages:
      - java
    mode: taint
    pattern-sanitizers:
      - pattern: org.apache.commons.text.StringEscapeUtils.escapeJava(...);
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $STATIC_LOGGER.$METHOD(...,$DATA,...);
              - pattern: (Logger $LOG).$METHOD(..., $DATA,...);
              - pattern: (org.apache.log4j.Category $LOG).$METHOD(..., $DATA,...);
              - pattern: (org.apache.logging.log4j.LogBuilder $LB).$METHOD(..., $DATA,...);
              - pattern: (com.google.common.flogger.LoggingApi $API).$METHOD(..., $DATA,...);
              - pattern: (org.jboss.logging.BasicLogger $LOG).$METHOD(..., $DATA,...);
              - pattern: (org.slf4j.spi.LoggingEventBuilder $LEB).$METHOD(..., $DATA,...);
              - pattern: org.apache.cxf.common.logging.LogUtils.$METHOD(..., $DATA,...);
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(log|logp|logrb|entering|exiting|fine|finer|finest|info|debug|trace|warn|warning|config|error|severe|fatal|assertLog|forcedLog|l7dlog|entry|logMessage|printf|traceEntry|traceExit|logVarargs|alwaysLog|wtf|debugf|debugv|errorf|errorv|fatalf|fatalv|infof|infov|tracef|tracev|warnf|warnv|logf|logv)$
          - metavariable-pattern:
              metavariable: $STATIC_LOGGER
              pattern-either:
                - pattern: org.pmw.tinylog.Logger
                - pattern: org.apache.log4j.Logger
                - pattern: org.apache.logging.log4j.Logger
                - pattern: org.slf4j.Logger
                - pattern: org.apache.commons.logging.Log
                - pattern: java.util.logging.Logger
                - pattern: android.util.Log
      # ANALYZER LIMITATION: Inner class types not supported in typed metavariables.
      # java.lang.System.Logger log methods cannot be matched with typed patterns.
      # TODO: Re-enable when analyzer supports inner class types in typed patterns.
      # Affects 8 CodeQL entries for java.lang.System.Logger.log(...)

  - id: seam-log-injection-sinks
    options:
      lib: true
    severity: NOTE
    message: Potential injection into Seam logging expression language
    metadata:
      provenance: https://find-sec-bugs.github.io/bugs.htm#SEAM_LOG_INJECTION
    languages:
      - java
    patterns:
      - pattern: |
          (org.jboss.seam.log.Log $LOGGER).$LEVEL($DATA,...)
      - metavariable-regex:
          metavariable: $LEVEL
          regex: (debug|error|fatal|info|trace|warn)
