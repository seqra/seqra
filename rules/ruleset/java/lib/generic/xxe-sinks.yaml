rules:
  - id: java-xxe-sinks
    options:
      lib: true
    severity: NOTE
    message: Parsing untrusted XML data with insufficient safety control
    metadata:
      provenance:
        - https://github.com/semgrep/semgrep-rules/tree/develop/java/lang/security/audit/xxe
        - https://github.com/semgrep/semgrep-rules/blob/develop/java/lang/security/audit/xml-decoder.yaml
        - https://gitlab.com/gitlab-org/security-products/sast-rules/-/blob/main/java/xml/rule-XsltTransform.yml
    languages:
      - java
    patterns:
      - pattern-either:
          - patterns:
              - patterns:
                  - pattern-not-inside: |
                      $FACTORY.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true);
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setFeature("http://javax.xml.XMLConstants/feature/secure-processing", true);
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setAttribute(XMLConstants.ACCESS_EXTERNAL_DTD, "");
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setAttribute("http://javax.xml.XMLConstants/property/accessExternalDTD", "");
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setAttribute(XMLConstants.ACCESS_EXTERNAL_SCHEMA, "");
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setAttribute("http://javax.xml.XMLConstants/property/accessExternalSchema", "");
                      ...
              - patterns:
                  - pattern-not-inside: |
                      $FACTORY.setFeature("http://xml.org/sax/features/external-parameter-entities", false);
                      ...
                  - pattern-not-inside: |
                      $FACTORY.setFeature("http://xml.org/sax/features/external-general-entities", false);
                      ...
              - pattern-either:
                  - patterns:
                      - pattern-inside: |
                          $FACTORY = SAXParserFactory.newInstance();
                          ...
                      - pattern: (javax.xml.parsers.SAXParserFactory $FACTORY).newSAXParser().parse($UNTRUSTED, ...);
                  - patterns:
                      - pattern-inside: |
                          $FACTORY = new SAXReader(...);
                          ...
                      - pattern: (org.dom4j.io.SAXReader $FACTORY).read($UNTRUSTED);
                  - patterns:
                      - pattern-inside: |
                          $FACTORY = DocumentBuilderFactory.newInstance();
                          ...
                      - pattern: |
                          $DOCBUILDER = (javax.xml.parsers.DocumentBuilderFactory $FACTORY).newDocumentBuilder();
                          ...
                          $DOCBUILDER.parse($UNTRUSTED, ...);
                  - patterns:
                      - pattern-inside: |
                          $FACTORY = XMLReaderFactory.createXMLReader();
                          ...
                      - pattern: (org.xml.sax.XMLReader $FACTORY).parse($UNTRUSTED);
                  - patterns:
                      - pattern-inside: |
                          $FACTORY = javax.xml.transform.TransformerFactory.newInstance();
                          ...
                      - pattern-either:
                          - pattern: |
                              (javax.xml.transform.TransformerFactory $FACTORY).newTransformer($UNTRUSTED, ...)
                          - pattern: |
                              (javax.xml.transform.Transformer $T) = (javax.xml.transform.TransformerFactory $FACTORY).newTransformer();
                              ...
                              $T.transform($UNTRUSTED, ...)

          - patterns:
              - pattern-either:
                  - patterns:
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty(XMLInputFactory.IS_SUPPORTING_EXTERNAL_ENTITIES, Boolean.FALSE);
                            ...
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty(XMLInputFactory.IS_SUPPORTING_EXTERNAL_ENTITIES, false);
                            ...
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty("javax.xml.stream.isSupportingExternalEntities", Boolean.FALSE);
                            ...
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty("javax.xml.stream.isSupportingExternalEntities", false);
                            ...
                  - patterns:
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty(XMLInputFactory.SUPPORT_DTD, Boolean.FALSE);
                            ...
                      - pattern-not-inside: |
                            $XMLFACTORY.setProperty(XMLInputFactory.SUPPORT_DTD, false);
                            ...
                      - pattern-not-inside: |
                            ...
                            $XMLFACTORY.setProperty("javax.xml.stream.supportDTD", Boolean.FALSE);
                            ...
                      - pattern-not-inside: |
                            ...
                            $XMLFACTORY.setProperty("javax.xml.stream.supportDTD", false);
                            ...
              - pattern: |
                  (javax.xml.stream.XMLInputFactory $XMLFACTORY).createXMLStreamReader($UNTRUSTED);

              - pattern-inside: |
                  $XMLFACTORY = XMLInputFactory.newInstance();
                  ...

          - pattern: |
              (org.apache.commons.digester3.Digester $DIGESTER).parse($UNTRUSTED)

          - pattern: new java.beans.XMLDecoder($UNTRUSTED);
          - pattern: new java.beans.XMLDecoder($UNTRUSTED, $OWNER);
          - pattern: new java.beans.XMLDecoder($UNTRUSTED, $OWNER, $EXCEPTION_LISTENER);

          # Saxon Xslt30Transformer (Argument[this] — transformer loaded with malicious XSLT)
          - patterns:
              - pattern: (net.sf.saxon.s9api.Xslt30Transformer $SINK).$METHOD(...)
              - metavariable-regex:
                  metavariable: $METHOD
                  regex: ^(applyTemplates|callFunction|callTemplate|transform)$
              - focus-metavariable: $SINK
          # Saxon XsltTransformer (Argument[this])
          - patterns:
              - pattern: (net.sf.saxon.s9api.XsltTransformer $SINK).transform(...)
              - focus-metavariable: $SINK
          # Apache CXF XSLTUtils (Argument[0] — Templates tainted with malicious XSLT)
          - pattern: org.apache.cxf.transform.XSLTUtils.transform($UNTRUSTED, ...)
