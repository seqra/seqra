rules:
  - id: java-servlet-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into a response without safe content type
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/security/XSS.qll
    languages:
      - java
    mode: taint

    # Servlet spec defaults Content-Type to text/html when not set
    # explicitly, so writer/OutputStream output is XSS by default unless
    # `setContentType("...")` pins a non-HTML value. Mirrors the Spring
    # sibling rule's strategy for raw `HttpServlet` handlers.

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: Encode.forHtml(..., $UNTRUSTED, ...)
              - pattern: (PolicyFactory $POLICY).sanitize(..., $UNTRUSTED, ...)
              - pattern: (AntiSamy $AS).scan(..., $UNTRUSTED, ...)
              - pattern: JSoup.clean(..., $UNTRUSTED, ...)
              - pattern: HtmlUtils.htmlEscape(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(..., $UNTRUSTED, ...)
              - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(..., $UNTRUSTED, ...)
          - focus-metavariable: $UNTRUSTED

    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: |
                  $W = (HttpServletResponse $RESPONSE).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  $W = (HttpServletResponse $RESPONSE).getOutputStream(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              - pattern: (HttpServletResponse $RESPONSE).sendError($CODE, $UNTRUSTED)
              - pattern: (java.io.PrintWriter $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (PrintWriter $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (javax.servlet.ServletOutputStream $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (ServletOutputStream $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (jakarta.servlet.jsp.JspWriter $W).$WRITE(..., $UNTRUSTED, ...)

          # `$CT_SAFE` is placed OUTSIDE the source-pattern quotes so it
          # binds to the entire string-literal expression. The
          # `metavariable-pattern` alternatives are then quoted Java
          # string literals (e.g., `'"application/json"'`). The bare-
          # identifier form (`application/json`) cannot be used because
          # the engine parses it as a Java AST expression — `/` and `-`
          # become operators, so e.g. `application/octet-stream` is
          # truncated to `application/octet` (BLOCKING parse error).
          - patterns:
              - pattern-not-inside: |
                  (HttpServletResponse $RESPONSE).setContentType($CT_SAFE);
                  ...
              - metavariable-pattern:
                  metavariable: $CT_SAFE
                  patterns:
                    - pattern-either:
                        - pattern: '"application/json"'
                        - pattern: '"application/json;charset=UTF-8"'
                        - pattern: '"text/plain"'
                        - pattern: '"application/pdf"'
                        - pattern: '"application/octet-stream"'
                        - pattern: '"application/xml"'
                        - pattern: '"text/xml"'
                        - pattern: '"image/png"'
                        - pattern: '"image/jpeg"'
                        - pattern: '"image/gif"'
                        # `setContentType(String)` accepts the Spring
                        # `MediaType.X_VALUE` String constants too. The
                        # dev analyzer constant-folds them, but we list
                        # them explicitly so the negation survives
                        # analyzer regressions / older builds. Short
                        # `MediaType.X_VALUE` form relies on the
                        # engine's import resolution; raw-servlet code
                        # that pulls in `org.springframework.http.MediaType`
                        # for its String constants is unusual but valid.
                        - pattern: MediaType.APPLICATION_JSON_VALUE
                        - pattern: MediaType.TEXT_PLAIN_VALUE
                        - pattern: MediaType.APPLICATION_PDF_VALUE
                        - pattern: MediaType.APPLICATION_OCTET_STREAM_VALUE
                        - pattern: MediaType.APPLICATION_XML_VALUE
                        - pattern: MediaType.TEXT_XML_VALUE
                        - pattern: MediaType.IMAGE_PNG_VALUE
                        - pattern: MediaType.IMAGE_JPEG_VALUE
                        - pattern: MediaType.IMAGE_GIF_VALUE
          - focus-metavariable: $UNTRUSTED
