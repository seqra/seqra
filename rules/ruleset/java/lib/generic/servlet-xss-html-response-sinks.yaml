rules:
  - id: java-servlet-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into a response without safe content type
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/security/XSS.qll
    languages:
      - java
    mode: taint
    pattern-sanitizers:
      - pattern-either:
          - pattern: Encode.forHtml(...)
          - pattern: (PolicyFactory $POLICY).sanitize(...)
          - pattern: (AntiSamy $AS).scan(...)
          - pattern: JSoup.clean(...)
          - pattern: HtmlUtils.htmlEscape(...)
          - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(...)
          - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(...)
          # Multi-statement single-pattern sanitizer: when the same response
          # object has a non-HTML setContentType / setHeader / addHeader
          # call followed by a writer / outputStream write, sanitize the
          # writer's data argument. Mirrors
          # servlet-untrusted-data-source.yaml's multi-statement style.
          - patterns:
              - pattern-either:
                  - pattern: |
                      (HttpServletResponse $RESPONSE).setContentType($CT);
                      ...
                      (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
                  - pattern: |
                      (HttpServletResponse $RESPONSE).setContentType($CT);
                      ...
                      (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...);
                  - pattern: |
                      (HttpServletResponse $RESPONSE).setHeader("Content-Type", $CT);
                      ...
                      (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
                  - pattern: |
                      (HttpServletResponse $RESPONSE).setHeader("Content-Type", $CT);
                      ...
                      (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...);
                  - pattern: |
                      (HttpServletResponse $RESPONSE).addHeader("Content-Type", $CT);
                      ...
                      (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
                  - pattern: |
                      (HttpServletResponse $RESPONSE).addHeader("Content-Type", $CT);
                      ...
                      (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...);
              - metavariable-pattern:
                  metavariable: $CT
                  pattern-either:
                    - pattern: '"application/json"'
                    - pattern: '"application/json;charset=UTF-8"'
                    - pattern: '"application/json; charset=UTF-8"'
                    - pattern: '"application/json;charset=utf-8"'
                    - pattern: '"text/plain"'
                    - pattern: '"text/plain;charset=UTF-8"'
                    - pattern: '"application/pdf"'
                    - pattern: '"application/octet-stream"'
                    - pattern: '"application/xml"'
                    - pattern: '"application/xml;charset=UTF-8"'
                    - pattern: '"text/xml"'
                    - pattern: '"image/png"'
                    - pattern: '"image/jpeg"'
                    - pattern: '"image/gif"'
              - focus-metavariable: $UNTRUSTED

    # Servlet spec defaults to text/html when no content type is set.
    # Writer/OutputStream is XSS-vulnerable unless a safe content type
    # (application/json, text/plain, etc.) is explicitly set on the response.
    pattern-sinks:
      - patterns:
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/json");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/json;charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/json; charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("text/plain");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("text/plain;charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("text/plain; charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/pdf");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/octet-stream");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("application/xml;charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("text/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("image/png");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("image/jpeg");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setContentType("image/gif");
              ...
          # ── setHeader / addHeader equivalents ─────────────────────────
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "application/json");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "application/json;charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "text/plain");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "application/pdf");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "application/octet-stream");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "application/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "text/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "image/png");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "image/jpeg");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).setHeader("Content-Type", "image/gif");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "application/json");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "application/json;charset=UTF-8");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "text/plain");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "application/pdf");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "application/octet-stream");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "application/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "text/xml");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "image/png");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "image/jpeg");
              ...
          - pattern-not-inside: |
              (HttpServletResponse $RESPONSE).addHeader("Content-Type", "image/gif");
              ...
          - pattern-either:
              - pattern: |
                  (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...)
              - pattern: |
                  (HttpServletResponse $RESPONSE).sendError($CODE, $UNTRUSTED)
          - focus-metavariable: $UNTRUSTED
