rules:
  - id: java-servlet-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into a response without safe content type
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/security/XSS.qll
    languages:
      - java
    mode: taint

    # Servlet spec defaults Content-Type to text/html when not set
    # explicitly, so writer/OutputStream output is XSS by default unless
    # `setContentType("...")` pins a non-HTML value. Mirrors the Spring
    # sibling rule's strategy for raw `HttpServlet` handlers.

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: Encode.forHtml(..., $UNTRUSTED, ...)
              - pattern: (PolicyFactory $POLICY).sanitize(..., $UNTRUSTED, ...)
              - pattern: (AntiSamy $AS).scan(..., $UNTRUSTED, ...)
              - pattern: JSoup.clean(..., $UNTRUSTED, ...)
              - pattern: HtmlUtils.htmlEscape(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(..., $UNTRUSTED, ...)
              - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(..., $UNTRUSTED, ...)
          - focus-metavariable: $UNTRUSTED

    pattern-sinks:
      # `pattern-either` covers the two writer-call arities; collapsing
      # them via a method-name metavar (`$STREAM(...).$WRITE(...)`) fails
      # with "Method name metavar constraints intersection" (issue 99).
      #
      # Negation MUST be `pattern-not-inside`, not `pattern-not` (the
      # latter trips an inconsistent-state automata bug at
      # `SemgrepRuleToAutomata.kt:82-84`).
      #
      # `$CT` is constrained by a co-located `metavariable-pattern` under
      # the same `patterns:` group — sibling-level constraints silently
      # do not filter negative-scope bindings.
      - patterns:
          - pattern-inside: |
              $RT $METHOD(HttpServletRequest $REQ, HttpServletResponse $RESPONSE) {
                ...
              }
          - pattern-either:
              - pattern: (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  $W = (HttpServletResponse $RESPONSE).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
          # `image/svg+xml` is deliberately NOT excluded — SVG can host
          # inline `<script>` and execute.
          - patterns:
              - pattern-not-inside: |
                  $RT $METHOD(HttpServletRequest $REQ, HttpServletResponse $RESPONSE) {
                    ...
                    (HttpServletResponse $RESPONSE).setContentType($CT);
                    ...
                  }
              - metavariable-pattern:
                  metavariable: $CT
                  patterns:
                    - pattern-either:
                        - pattern: '"application/json"'
                        - pattern: '"application/json;charset=UTF-8"'
                        - pattern: '"text/plain"'
                        - pattern: '"application/pdf"'
                        - pattern: '"application/octet-stream"'
                        - pattern: '"application/xml"'
                        - pattern: '"text/xml"'
                        - pattern: '"image/png"'
                        - pattern: '"image/jpeg"'
                        - pattern: '"image/gif"'
          - focus-metavariable: $UNTRUSTED
