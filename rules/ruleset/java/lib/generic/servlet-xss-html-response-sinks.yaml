rules:
  - id: java-servlet-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into a response without safe content type
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/security/XSS.qll
    languages:
      - java
    mode: taint

    # Servlet spec defaults Content-Type to text/html when not set
    # explicitly, so writer/OutputStream output is XSS by default unless
    # `setContentType("...")` pins a non-HTML value. Mirrors the Spring
    # sibling rule's strategy for raw `HttpServlet` handlers.

    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: Encode.forHtml(..., $UNTRUSTED, ...)
              - pattern: (PolicyFactory $POLICY).sanitize(..., $UNTRUSTED, ...)
              - pattern: (AntiSamy $AS).scan(..., $UNTRUSTED, ...)
              - pattern: JSoup.clean(..., $UNTRUSTED, ...)
              - pattern: HtmlUtils.htmlEscape(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(..., $UNTRUSTED, ...)
              - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(..., $UNTRUSTED, ...)
          - focus-metavariable: $UNTRUSTED

    pattern-sinks:
      # Method-shell `pattern-inside` binds `$RESPONSE` so the safe-CT
      # exclusion below can refer to the same response object even for
      # sink shapes that do not mention it (typed PrintWriter locals,
      # JspWriter, etc.).
      #
      # Negation MUST be `pattern-not-inside`, not `pattern-not` (the
      # latter trips an inconsistent-state automata bug at
      # `SemgrepRuleToAutomata.kt:82-84`).
      #
      # `$CT` is constrained by a co-located `metavariable-pattern` under
      # the same `patterns:` group — sibling-level constraints silently
      # do not filter negative-scope bindings.
      #
      # The `$WRITE` method-name metavar cannot be constrained further
      # (engine issue 99 — "Method name metavar constraints
      # intersection"), so each writer-call arity is spelled out as a
      # separate alternative under `pattern-either`.
      - patterns:
          - pattern-inside: |
              $RT $METHOD(HttpServletRequest $REQ, HttpServletResponse $RESPONSE) {
                ...
              }
          - pattern-either:
              # Chained writer / output-stream calls.
              - pattern: (HttpServletResponse $RESPONSE).getWriter(...).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (HttpServletResponse $RESPONSE).getOutputStream(...).$WRITE(..., $UNTRUSTED, ...)
              # `sendError(code, msg)` writes the message into the default
              # error page, which the container renders as text/html.
              - pattern: (HttpServletResponse $RESPONSE).sendError($CODE, $UNTRUSTED)
              # Local-var assignment shapes (writer / output-stream).
              - pattern: |
                  $W = (HttpServletResponse $RESPONSE).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  $W = (HttpServletResponse $RESPONSE).getOutputStream(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              # Pre-existing typed locals — writer / output-stream / JSP
              # writer that arrived from elsewhere (constructor, helper,
              # parameter). Both the FQN and short forms are spelled out
              # because Semgrep does not unify them automatically when
              # the import is absent in the sample.
              - pattern: (java.io.PrintWriter $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (PrintWriter $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (javax.servlet.ServletOutputStream $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (ServletOutputStream $W).$WRITE(..., $UNTRUSTED, ...)
              - pattern: (jakarta.servlet.jsp.JspWriter $W).$WRITE(..., $UNTRUSTED, ...)
          # `image/svg+xml` is deliberately NOT excluded — SVG can host
          # inline `<script>` and execute.
          #
          # `$CT_SAFE` is placed INSIDE the source-pattern quotes
          # (`"$CT_SAFE"`) so the metavar binds to the string-literal
          # contents; a sibling `metavariable-regex` then filters those
          # contents. Mirrors the Spring sibling rule's Branch 2 shape.
          - patterns:
              - pattern-not-inside: |
                  $RT $METHOD(HttpServletRequest $REQ, HttpServletResponse $RESPONSE) {
                    ...
                    (HttpServletResponse $RESPONSE).setContentType("$CT_SAFE");
                    ...
                  }
              - metavariable-regex:
                  metavariable: $CT_SAFE
                  regex: '^(application/json|text/plain|application/pdf|application/octet-stream|application/xml|text/xml|image/png|image/jpeg|image/gif)(\s*;.*)?$'
          - focus-metavariable: $UNTRUSTED
