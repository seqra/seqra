rules:
  - id: spring-untrusted-data-source
    options:
      lib: true
    severity: NOTE
    message: Untrusted data flows from here
    metadata:
      short-description: Untrusted data source in Spring request handlers
      full-description: |-
        This is a source rule for untrusted input in Spring MVC / Spring Boot handlers.
        It marks method parameters and request-derived values as tainted when they can be
        controlled by an external caller.

        Typical source locations matched by this rule include:
        - Handler method parameters in `@RequestMapping`, `@GetMapping`, `@PostMapping`, etc.
        - Values returned by `MessageBodyReader.readFrom(...)`
        - Cookie values resolved via `WebUtils.getCookie(...).getValue()`

        Example source usage (tainted):

        ```java
        import org.springframework.web.bind.annotation.GetMapping;
        import org.springframework.web.bind.annotation.RequestParam;
        import org.springframework.web.bind.annotation.RestController;

        @RestController
        class SearchController {
            @GetMapping("/search")
            String search(@RequestParam String q) {
                // q is a source: untrusted user-controlled input
                return doSearch(q);
            }

            private String doSearch(String input) {
                // Vulnerability findings appear only when this value reaches an unsafe usage.
                return input;
            }
        }
        ```

        Recommended handling at the boundary:
        - Assume all request parameters, headers, cookies, and bodies are untrusted.
        - Apply validation constraints (Bean Validation / explicit checks) close to controller boundaries.
        - Normalize and map external input to typed internal models before unsafe usage.
    languages:
      - java
    patterns:
      - pattern-either:
          # ── Spring MVC: annotated handler method parameters ──
          - patterns:
              - pattern: |
                  @$ANNOTATION(...)
                  $RETURNTYPE $METHODNAME(..., $TYPE $UNTRUSTED,...) {
                    ...
                  }
              - metavariable-regex:
                  metavariable: $TYPE
                  regex: ^(?!(Integer|Long|Float|Double|Char|Boolean|int|long|float|double|char|boolean|BindingResult|HttpMethod|java.util.TimeZone|java.util.Locale|java.util.ZoneId))
              - metavariable-pattern:
                  metavariable: $ANNOTATION
                  patterns:
                    - pattern-either:
                        - pattern: RequestMapping
                        - pattern: DeleteMapping
                        - pattern: GetMapping
                        - pattern: PatchMapping
                        - pattern: PostMapping
                        - pattern: PutMapping

          # ── JAX-RS: MessageBodyReader ──
          - pattern: |
              $UNTRUSTED = (MessageBodyReader $READER).readFrom(...);

          # ── Spring: WebUtils.getCookie ──
          - pattern: |
              Cookie $COOKIE = org.springframework.web.util.WebUtils.getCookie(...);
              ...
              $UNTRUSTED = $COOKIE.getValue();

          # ── Spring Security: SavedRequest return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (SavedRequest $REQ).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: getCookies|getHeaderNames|getHeaderValues|getParameterMap|getParameterValues|getRedirectUrl

          # ── Spring: RestTemplate return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (RestTemplate $RT).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: exchange|getForEntity|postForEntity

          # ── Spring: WebRequest return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (WebRequest $REQ).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: getDescription|getHeader|getHeaderNames|getHeaderValues|getParameter|getParameterMap|getParameterNames|getParameterValues

          # ── Spring: MultipartFile return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (MultipartFile $F).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: getBytes|getContentType|getInputStream|getName|getOriginalFilename|getResource

          # ── Spring: MultipartRequest return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (MultipartRequest $REQ).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: getFile|getFileMap|getFileNames|getFiles|getMultiFileMap|getMultipartContentType

          # ── Spring WebSocket: WebSocketHandler.handleMessage callback ──
          - pattern: |
              $RETURNTYPE handleMessage(WebSocketSession $SESSION, WebSocketMessage $UNTRUSTED) {
              ...
              }

          # ── Spring WebSocket: WebSocketHandler.afterConnectionEstablished callback ──
          - pattern: |
              $RETURNTYPE afterConnectionEstablished(WebSocketSession $UNTRUSTED) {
              ...
              }

          # ── Spring WebSocket: WebSocketHandler.afterConnectionClosed callback ──
          - pattern: |
              $RETURNTYPE afterConnectionClosed(WebSocketSession $UNTRUSTED, ...) {
              ...
              }

          # ── Spring WebSocket: WebSocketHandler.handleTransportError callback ──
          - pattern: |
              $RETURNTYPE handleTransportError(WebSocketSession $UNTRUSTED, ...) {
              ...
              }

          # ── Spring WebSocket: AbstractWebSocketHandler.handleTextMessage callback ──
          - pattern: |
              $RETURNTYPE handleTextMessage(WebSocketSession $SESSION, TextMessage $UNTRUSTED) {
              ...
              }

          # ── Spring WebSocket: AbstractWebSocketHandler.handleBinaryMessage callback ──
          - pattern: |
              $RETURNTYPE handleBinaryMessage(WebSocketSession $SESSION, BinaryMessage $UNTRUSTED) {
              ...
              }

          # ── Spring WebSocket: AbstractWebSocketHandler.handlePongMessage callback ──
          - pattern: |
              $RETURNTYPE handlePongMessage(WebSocketSession $SESSION, PongMessage $UNTRUSTED) {
              ...
              }

          # ── Spring: UrlPathHelper return-value methods ──
          - patterns:
            - pattern: |
                $UNTRUSTED = (UrlPathHelper $H).$METHOD(...);
            - metavariable-regex:
                metavariable: $METHOD
                regex: getLookupPathForRequest|getOriginatingQueryString|getOriginatingRequestUri|getPathWithinApplication|getPathWithinServletMapping|getRequestUri|getResolvedLookupPath|getServletPath|resolveAndCacheLookupPath
