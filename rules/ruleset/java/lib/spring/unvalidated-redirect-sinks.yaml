rules:
  - id: spring-unvalidated-redirect-sinks
    options:
      lib: true
    severity: NOTE
    message: Potential redirect to an untrusted URL
    metadata:
      provenance:
        - https://github.com/semgrep/semgrep-rules/blob/develop/java/spring/security/audit/spring-unvalidated-redirect.yaml
        - https://github.com/github/codeql/blob/cdd8aa49e16650a96b8993e8745c7672600fe930/java/ql/lib/ext/org.owasp.esapi.model.yml
    languages:
      - java
    mode: taint
    pattern-sanitizers:
      # CodeQL UrlRedirect.qll — URL encoding stops user input from
      # controlling the host or scheme portion of the target.
      - pattern: java.net.URLEncoder.encode($UNTRUSTED)
      - pattern: java.net.URLEncoder.encode($UNTRUSTED, $_)
      - pattern: com.google.common.net.UrlEscapers.urlPathSegmentEscaper().escape($UNTRUSTED)
      - pattern: com.google.common.net.UrlEscapers.urlFormParameterEscaper().escape($UNTRUSTED)
      - pattern: com.google.common.net.UrlEscapers.urlFragmentEscaper().escape($UNTRUSTED)
      # OWASP ESAPI Validator.getValidRedirectLocation
      - pattern: org.owasp.esapi.ESAPI.validator().getValidRedirectLocation(...)
      # pixee Urls.create — policy-filtered URL construction.
      - pattern: io.github.pixee.security.Urls.create(...)
    pattern-sinks:
      - pattern: new RedirectView($URL);
      - pattern: new ModelAndView("redirect:" + $URL);
      - pattern: (HttpServletResponse $RES).sendRedirect($URL);
      - pattern: (HttpServletResponse $RES).addHeader("Location", $URL);
      - patterns:
        - pattern: |
            @$ANNOTATION(...)
            $RETURNTYPE $METHOD(...) {
              ...
              return "$REDIRECT" + $URL;
              ...
            }

        - metavariable-regex:
            metavariable: $REDIRECT
            regex: "redirect:.*"

        - metavariable-pattern:
            metavariable: $ANNOTATION
            patterns:
              - pattern-either:
                - pattern: RequestMapping
                - pattern: DeleteMapping
                - pattern: GetMapping
                - pattern: PatchMapping
                - pattern: PostMapping
                - pattern: PutMapping
