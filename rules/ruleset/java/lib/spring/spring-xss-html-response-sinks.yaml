rules:
  - id: spring-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Return of unvalidated user input from a Spring handler vulnerable to XSS
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/frameworks/spring/SpringHttp.qll
    languages:
      - java
    mode: taint

    # The rule fires when the response Content-Type defaults to text/html
    # (the DEFAULT-DANGEROUS shapes — `String`, `ResponseEntity<$T>`,
    # `CompletableFuture<$T>` returns) unless an explicit non-HTML signal
    # subtracts it. Branch 2 covers the DEFAULT-SAFE servlet-writer shape
    # which fires only on an explicit text/html signal.

    pattern-sanitizers:
      # Standard HTML encoders / escapers. `focus-metavariable: $UNTRUSTED`
      # scopes sanitization to the encoded argument.
      - patterns:
          - pattern-either:
              - pattern: Encode.forHtml(..., $UNTRUSTED, ...)
              - pattern: (PolicyFactory $POLICY).sanitize(..., $UNTRUSTED, ...)
              - pattern: (AntiSamy $AS).scan(..., $UNTRUSTED, ...)
              - pattern: JSoup.clean(..., $UNTRUSTED, ...)
              - pattern: HtmlUtils.htmlEscape(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(..., $UNTRUSTED, ...)
              - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(..., $UNTRUSTED, ...)
          - focus-metavariable: $UNTRUSTED

      # ResponseEntity builder chains pinning a non-HTML Content-Type.
      # Forward-compatible: `TaintRuleProcessing.kt:413` ignores
      # `focus-metavariable` on sanitizers today, so this is a no-op
      # against the current engine. Becomes load-bearing once the TODO
      # lands (suppresses matrix rows 10 / 12 / 15 / 18 / 19).
      - patterns:
          - pattern-either:
              - pattern: $X.contentType(MediaType.APPLICATION_JSON).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_PDF).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_OCTET_STREAM).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.TEXT_PLAIN).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_XML).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_PNG).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_JPEG).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_GIF).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/json").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/pdf").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/octet-stream").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "text/plain").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/xml").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/png").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/jpeg").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/gif").body($UNTRUSTED)
              # `header(name, value)` takes a `String` value, so the
              # `MediaType.X_VALUE` String constants are also valid
              # arguments. The dev analyzer constant-folds them to the
              # bare-string form above and these alternatives are
              # therefore redundant under it; kept explicit for
              # robustness against analyzer regressions / older builds.
              - pattern: $X.header("Content-Type", MediaType.APPLICATION_JSON_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.APPLICATION_PDF_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.APPLICATION_OCTET_STREAM_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.TEXT_PLAIN_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.APPLICATION_XML_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.IMAGE_PNG_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.IMAGE_JPEG_VALUE).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", MediaType.IMAGE_GIF_VALUE).body($UNTRUSTED)
          - focus-metavariable: $UNTRUSTED

      # `new ResponseEntity<>(body, headers, status)` with a non-HTML
      # content type set on the headers object beforehand. Same engine
      # TODO as above; suppresses matrix row 13 once fixed.
      - patterns:
          - pattern-either:
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_JSON);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_PDF);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_OCTET_STREAM);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.TEXT_PLAIN);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_XML);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
          - focus-metavariable: $UNTRUSTED

    pattern-sinks:
      # Branch 1: handler return — DEFAULT-DANGEROUS return types.
      #
      # Negation MUST be `pattern-not-inside`, not `pattern-not`. With
      # `pattern-not` the automata builder hits an inconsistent-state bug
      # ("Automata without method enter contains end edges" —
      # `SemgrepRuleToAutomata.kt:82-84`).
      #
      # `$PRODUCES` is constrained by a co-located `metavariable-pattern`
      # under the same `patterns:` group; a sibling-level constraint
      # silently does not filter negative-scope bindings.
      - patterns:
          - metavariable-pattern:
              metavariable: $ANNOTATION
              patterns:
                - pattern-either:
                    - pattern: GetMapping
                    - pattern: PostMapping
                    - pattern: PutMapping
                    - pattern: PatchMapping
                    - pattern: DeleteMapping
                    - pattern: RequestMapping
          # Pair each return-type shape with its dedicated sink:
          #   - body-typed returns (String / ResponseEntity / CompletableFuture)
          #     feed the response via `return $UNTRUSTED;`
          #   - `DeferredResult<$T>` feeds the response via the wrapper's
          #     `$DR.setResult(tainted)` call before returning the wrapper.
          - pattern-either:
              - patterns:
                  - pattern-either:
                      # Body-typed returns whose default Content-Type can
                      # land on text/html. The engine implements exact
                      # type-arg matching at the method-decl return
                      # position (see `TypeAwarePatternTest` A1 etc.), so
                      # `ResponseEntity<String>` / `<byte[]>` etc. are
                      # declarative discriminators rather than
                      # placeholders. (An older comment here claimed the
                      # return-statement sink path lost type-arg
                      # discrimination end-to-end and that
                      # `ResponseEntity<DTO>` etc. would still match —
                      # the 2026-05-05 Stirling-PDF re-scan empirically
                      # disproves that: removing the raw `ResponseEntity`
                      # alternative on its own dropped the FP count
                      # from 42 to 9, i.e., the parameterized form does
                      # NOT over-match `<DTO>` returns.)
                      #
                      # The `String` return shape was previously gated by
                      # `pattern-not-inside @ResponseBody`, on the belief
                      # that body-write of a `String` lands on
                      # `text/plain` via `StringHttpMessageConverter`'s
                      # default and is therefore not XSS-exploitable.
                      # That belief was disproved empirically in
                      # `spring-app-tests/xss-in-spring-app-dynamic` —
                      # `StringHttpMessageConverter` does Accept-header
                      # content negotiation BEFORE falling back, and a
                      # real browser's `Accept: text/html` lifts the
                      # response to `Content-Type: text/html;charset=UTF-8`.
                      # `alert(1)` then fires in Chromium. We therefore
                      # do NOT exclude `@ResponseBody` (or its
                      # class-level `@RestController` form) here.
                      #
                      # The remaining over-approximation is a plain
                      # `@Controller` + `String` return that is treated
                      # as a view name. In practice that shape doesn't
                      # concatenate untrusted input into the returned
                      # view name string, so the source→sink dataflow
                      # path doesn't reach `return $UNTRUSTED;` and no
                      # FP fires.
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          String $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          ResponseEntity<String> $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          ResponseEntity<byte[]> $METHOD(...) {
                            ...
                          }
                      # Raw `ResponseEntity` (no type argument) is
                      # DEFAULT-DANGEROUS for the same reason as
                      # `ResponseEntity<String>`: the body's runtime
                      # type drives content negotiation, and a `String`
                      # body routes through `StringHttpMessageConverter`
                      # which serves `text/html` under `Accept: text/html`
                      # (Row 14). It must be listed as a separate
                      # alternative because `ResponseEntity<String>` /
                      # `<byte[]>` (concrete type-arg) patterns do not
                      # match a raw method-decl return type — see
                      # `TypeAwarePatternTest` A2.
                      #
                      # The engine matches the raw `pattern-inside`
                      # against every `ResponseEntity<*>` declaration
                      # too (it is more permissive than the typed
                      # alternatives, not narrower), so this branch
                      # would over-match `ResponseEntity<DTO>` /
                      # `<Map<...>>` etc. and contribute the dominant
                      # FP bucket. The nested `pattern-not-inside
                      # ResponseEntity<$T>` subtracts every
                      # parameterized declaration from the raw branch,
                      # leaving only the truly raw shape. This 2026-05-05
                      # Stirling-PDF re-scan confirmed: enabling the
                      # raw branch alone re-introduces 33 FPs; adding
                      # the `pattern-not-inside` subtraction holds the
                      # FP count at 9 (parameterized matches stay clean
                      # via their own concrete-type alternatives above).
                      - patterns:
                          - pattern-inside: |
                              @$ANNOTATION(...)
                              ResponseEntity $METHOD(...) {
                                ...
                              }
                          - pattern-not-inside: |
                              @$ANNOTATION(...)
                              ResponseEntity<$T> $METHOD(...) {
                                ...
                              }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          CompletableFuture<String> $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          CompletableFuture<byte[]> $METHOD(...) {
                            ...
                          }
                  - pattern: return $UNTRUSTED;
              - patterns:
                  - pattern-either:
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          DeferredResult<String> $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          DeferredResult<byte[]> $METHOD(...) {
                            ...
                          }
                  - pattern: $DR.setResult(..., $UNTRUSTED, ...);
          # `image/svg+xml` is deliberately NOT excluded — SVG can host
          # inline `<script>` and execute.
          #
          # `$PRODUCES` is placed OUTSIDE the source-pattern quotes so
          # it binds to the entire annotation-argument expression
          # (string literal OR `MediaType.X_VALUE` constant ref). The
          # `metavariable-pattern` alternatives mix quoted Java string
          # literals (e.g., `'"application/json"'`) with bare AST node
          # references (e.g., `MediaType.APPLICATION_JSON_VALUE`). A
          # bare-identifier MIME form like `application/json` cannot be
          # used because the engine parses `/` and `-` as Java
          # operators (BLOCKING parse error).
          - patterns:
              - pattern-not-inside: |
                  @$ANNOTATION(..., produces = $PRODUCES, ...)
                  $RETURNTYPE $METHOD(...) { ... }
              - metavariable-pattern:
                  metavariable: $PRODUCES
                  patterns:
                    - pattern-either:
                        - pattern: '"application/json"'
                        - pattern: '"text/plain"'
                        - pattern: '"application/pdf"'
                        - pattern: '"application/octet-stream"'
                        - pattern: '"application/xml"'
                        - pattern: '"text/xml"'
                        - pattern: '"image/png"'
                        - pattern: '"image/jpeg"'
                        - pattern: '"image/gif"'
                        - pattern: MediaType.APPLICATION_JSON_VALUE
                        - pattern: MediaType.TEXT_PLAIN_VALUE
                        - pattern: MediaType.APPLICATION_PDF_VALUE
                        - pattern: MediaType.APPLICATION_OCTET_STREAM_VALUE
                        - pattern: MediaType.APPLICATION_XML_VALUE
                        - pattern: MediaType.TEXT_XML_VALUE
                        - pattern: MediaType.IMAGE_PNG_VALUE
                        - pattern: MediaType.IMAGE_JPEG_VALUE
                        - pattern: MediaType.IMAGE_GIF_VALUE
          - focus-metavariable: $UNTRUSTED

      # Branch 1b: explicit HTML / SVG producer on the handler
      # annotation. Fires regardless of `@RestController` because an
      # explicit `produces` overrides the converter's default content
      # type. Recovers Rows 02 / 23 / 25.
      #
      # Single bare-metavar `pattern-inside` (`produces = $PRODUCES_HTML`)
      # binds the metavar to the entire annotation-argument expression,
      # then `metavariable-pattern` lists both quoted Java string
      # literals (`'"text/html"'` etc.) and bare `MediaType.X` constant
      # references. Constant references cannot appear directly at the
      # annotation-argument position in a rule pattern — the parser
      # rejects them as "Annotation_argument_is_not_string_or_metavar".
      - patterns:
          - pattern-inside: |
              @$ANNOTATION(..., produces = $PRODUCES_HTML, ...)
              $RT $METHOD(...) { ... }
          - metavariable-pattern:
              metavariable: $PRODUCES_HTML
              patterns:
                - pattern-either:
                    - pattern: '"text/html"'
                    - pattern: '"text/html;charset=UTF-8"'
                    - pattern: '"text/html;charset=utf-8"'
                    - pattern: '"image/svg+xml"'
                    - pattern: MediaType.TEXT_HTML_VALUE
                    - pattern: MediaType.IMAGE_SVG_XML_VALUE
          - pattern: return $UNTRUSTED;
          - focus-metavariable: $UNTRUSTED

      # Branch 1c: explicit HTML / SVG signal on a `ResponseEntity`
      # builder chain. Sink is the `return` statement that hands the
      # built entity back to Spring's dispatcher — `.body(...)` itself
      # only constructs an entity, it is the `return` that exposes the
      # response to the wire. Fires regardless of the handler's
      # declared return type (covers `Object`, `ResponseEntity<DTO>`,
      # custom wrappers) and regardless of the annotation's
      # `produces=` (the builder's `.contentType(...)` overrides the
      # framework default at runtime).
      #
      # `MediaType.TEXT_HTML` and `MediaType.IMAGE_SVG_XML` are the
      # `MediaType` instance constants; `BodyBuilder.contentType()`
      # accepts `MediaType` only (no `String` overload), so the
      # `_VALUE` String constants do NOT appear here.
      - patterns:
          - pattern-either:
              # Chained return: `return X.contentType(...).body(tainted);`
              - pattern: return $X.contentType(MediaType.TEXT_HTML).body($UNTRUSTED);
              - pattern: return $X.contentType(MediaType.IMAGE_SVG_XML).body($UNTRUSTED);
              # Local-var assignment then return.
              - pattern: |
                  $RE = $X.contentType(MediaType.TEXT_HTML).body($UNTRUSTED);
                  ...
                  return $RE;
              - pattern: |
                  $RE = $X.contentType(MediaType.IMAGE_SVG_XML).body($UNTRUSTED);
                  ...
                  return $RE;
          - focus-metavariable: $UNTRUSTED

      # Branch 2: servlet-style writer — DEFAULT-SAFE shape, fires only
      # on an explicit text/html signal via `setContentType` (1-arg) or
      # `setHeader` / `addHeader` (2-arg with header name "Content-Type").
      #
      # `$CT_HTML` is placed INSIDE the source-pattern quotes (`"$CT_HTML"`)
      # so the metavar binds to the string-literal contents; a sibling
      # `metavariable-regex` then filters those contents. Placing the
      # metavar OUTSIDE the quotes (`$CT_HTML` matching the whole literal
      # expression) registers the constraint but the engine does not
      # consult it during matching — see the standalone repro at
      # `core/opentaint-java-querylang/samples/.../issues/`.
      #
      # The two writer-call arities (chained / local-var) cannot be
      # collapsed via a method-name metavar — engine issue 99 ("Method
      # name metavar constraints intersection"). They appear as two
      # alternatives in `pattern-either`.
      - patterns:
          - pattern-either:
              - pattern: |
                  (HttpServletResponse $R).setContentType("$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  (HttpServletResponse $R).setHeader("Content-Type", "$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  (HttpServletResponse $R).addHeader("Content-Type", "$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
          - metavariable-regex:
              metavariable: $CT_HTML
              regex: '^text/html(\s*;.*)?$'
          - focus-metavariable: $UNTRUSTED
