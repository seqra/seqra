rules:
  - id: spring-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Return of unvalidated user input from a Spring handler vulnerable to XSS
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/frameworks/spring/SpringHttp.qll
    languages:
      - java
    mode: taint
    pattern-sanitizers:
      - pattern-either:
          - pattern: Encode.forHtml(...)
          - pattern: (PolicyFactory $POLICY).sanitize(...)
          - pattern: (AntiSamy $AS).scan(...)
          - pattern: JSoup.clean(...)
          - pattern: HtmlUtils.htmlEscape(...)
          - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(...)
          - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(...)
          - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(...)

    pattern-sinks:
      # ── Branch 1: handler return.
      #
      # Single-pattern shape (whole method declaration is one match unit).
      # The previous form — pattern-inside enumerating each @Mapping +
      # sibling `pattern: return $UNTRUSTED;` + focus-metavariable —
      # never matched any positive sample in the test corpus; see the
      # @Disabled engine-issue regression test for that.
      - patterns:
          - pattern: |
              @$ANNOTATION(...)
              $RETURNTYPE $METHOD(...) {
                ...
                return $UNTRUSTED;
                ...
              }
          - metavariable-pattern:
              metavariable: $ANNOTATION
              patterns:
                - pattern-either:
                    - pattern: GetMapping
                    - pattern: PostMapping
                    - pattern: PutMapping
                    - pattern: PatchMapping
                    - pattern: DeleteMapping
                    - pattern: RequestMapping
                    # @ExceptionHandler can also reflect attacker-controlled
                    # data (the exception message) into an HTML response.
                    - pattern: ExceptionHandler
          # `pattern-not` (not `pattern-not-inside`) is used here because
          # `pattern-not-inside` repeatedly complements an Inside automaton,
          # and a long list of those blows past the 2s automata build budget
          # (verified empirically). `pattern-not` over the same single-pattern
          # shape stays under budget.
          - pattern-not: |
              @$ANNOTATION(..., produces = "application/json", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "text/plain", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "application/pdf", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "application/octet-stream", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "application/xml", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "text/xml", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "image/png", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "image/jpeg", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - pattern-not: |
              @$ANNOTATION(..., produces = "image/gif", ...)
              $RETURNTYPE $METHOD(...) { ... }
          - focus-metavariable: $UNTRUSTED

      # ── Branch 2: handler that writes via the response writer.
      #
      # Two arities: chained `response.getWriter().$WRITE(...)` and
      # local-variable `$W = response.getWriter(); ...; $W.$WRITE(...)`.
      # Each is a separate top-level pattern; the engine doesn't support
      # collapsing them with a method-name metavar (`$STREAM(...).$WRITE(...)`
      # fails with "Method name metavar constraints intersection") — see
      # issue 99.
      - patterns:
          - pattern: |
              @$ANNOTATION(...)
              $RETURNTYPE $METHOD(...) {
                ...
                (HttpServletResponse $R).$SET_HTML($CT_HTML);
                ...
                (HttpServletResponse $R).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
                ...
              }
          - metavariable-pattern:
              metavariable: $ANNOTATION
              patterns:
                - pattern-either:
                    - pattern: GetMapping
                    - pattern: PostMapping
                    - pattern: PutMapping
                    - pattern: PatchMapping
                    - pattern: DeleteMapping
                    - pattern: RequestMapping
          - metavariable-pattern:
              metavariable: $SET_HTML
              pattern-either:
                - pattern: setContentType
                - pattern: setHeader
                - pattern: addHeader
          - metavariable-pattern:
              metavariable: $CT_HTML
              pattern-either:
                - pattern: '"text/html"'
                - pattern: '"text/html;charset=UTF-8"'
                - pattern: '"text/html; charset=UTF-8"'
                - pattern: '"text/html;charset=utf-8"'
                - pattern: '"text/html; charset=utf-8"'
          - focus-metavariable: $UNTRUSTED

      - patterns:
          - pattern: |
              @$ANNOTATION(...)
              $RETURNTYPE $METHOD(...) {
                ...
                (HttpServletResponse $R).$SET_HTML($CT_HTML);
                ...
                $W = (HttpServletResponse $R).getWriter(...);
                ...
                $W.$WRITE(..., $UNTRUSTED, ...);
                ...
              }
          - metavariable-pattern:
              metavariable: $ANNOTATION
              patterns:
                - pattern-either:
                    - pattern: GetMapping
                    - pattern: PostMapping
                    - pattern: PutMapping
                    - pattern: PatchMapping
                    - pattern: DeleteMapping
                    - pattern: RequestMapping
          - metavariable-pattern:
              metavariable: $SET_HTML
              pattern-either:
                - pattern: setContentType
                - pattern: setHeader
                - pattern: addHeader
          - metavariable-pattern:
              metavariable: $CT_HTML
              pattern-either:
                - pattern: '"text/html"'
                - pattern: '"text/html;charset=UTF-8"'
                - pattern: '"text/html; charset=UTF-8"'
                - pattern: '"text/html;charset=utf-8"'
                - pattern: '"text/html; charset=utf-8"'
          - focus-metavariable: $UNTRUSTED
