rules:
  - id: spring-xss-html-response-sink
    options:
      lib: true
    severity: NOTE
    message: Return of unvalidated user input from a Spring handler vulnerable to XSS
    metadata:
      provenance:
        - https://github.com/github/codeql/blob/main/java/ql/lib/semmle/code/java/frameworks/spring/SpringHttp.qll
    languages:
      - java
    mode: taint

    # The rule fires when the response Content-Type defaults to text/html
    # (the DEFAULT-DANGEROUS shapes — `String`, `ResponseEntity<$T>`,
    # `CompletableFuture<$T>` returns) unless an explicit non-HTML signal
    # subtracts it. Branch 2 covers the DEFAULT-SAFE servlet-writer shape
    # which fires only on an explicit text/html signal.

    pattern-sanitizers:
      # Standard HTML encoders / escapers. `focus-metavariable: $UNTRUSTED`
      # scopes sanitization to the encoded argument.
      - patterns:
          - pattern-either:
              - pattern: Encode.forHtml(..., $UNTRUSTED, ...)
              - pattern: (PolicyFactory $POLICY).sanitize(..., $UNTRUSTED, ...)
              - pattern: (AntiSamy $AS).scan(..., $UNTRUSTED, ...)
              - pattern: JSoup.clean(..., $UNTRUSTED, ...)
              - pattern: HtmlUtils.htmlEscape(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.lang.StringEscapeUtils.escapeHtml(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml3(..., $UNTRUSTED, ...)
              - pattern: org.apache.commons.text.StringEscapeUtils.escapeHtml4(..., $UNTRUSTED, ...)
              - pattern: org.owasp.esapi.ESAPI.encoder().encodeForHTML(..., $UNTRUSTED, ...)
          - focus-metavariable: $UNTRUSTED

      # ResponseEntity builder chains pinning a non-HTML Content-Type.
      # Forward-compatible: `TaintRuleProcessing.kt:413` ignores
      # `focus-metavariable` on sanitizers today, so this is a no-op
      # against the current engine. Becomes load-bearing once the TODO
      # lands (suppresses matrix rows 10 / 12 / 15 / 18 / 19).
      - patterns:
          - pattern-either:
              - pattern: $X.contentType(MediaType.APPLICATION_JSON).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_PDF).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_OCTET_STREAM).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.TEXT_PLAIN).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.APPLICATION_XML).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_PNG).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_JPEG).body($UNTRUSTED)
              - pattern: $X.contentType(MediaType.IMAGE_GIF).body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/json").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/pdf").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/octet-stream").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "text/plain").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "application/xml").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/png").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/jpeg").body($UNTRUSTED)
              - pattern: $X.header("Content-Type", "image/gif").body($UNTRUSTED)
          - focus-metavariable: $UNTRUSTED

      # `new ResponseEntity<>(body, headers, status)` with a non-HTML
      # content type set on the headers object beforehand. Same engine
      # TODO as above; suppresses matrix row 13 once fixed.
      - patterns:
          - pattern-either:
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_JSON);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_PDF);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_OCTET_STREAM);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.TEXT_PLAIN);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
              - pattern: |
                  $H.setContentType(MediaType.APPLICATION_XML);
                  ...
                  new ResponseEntity($UNTRUSTED, $H, ...);
          - focus-metavariable: $UNTRUSTED

    pattern-sinks:
      # Branch 1: handler return — DEFAULT-DANGEROUS return types.
      #
      # Negation MUST be `pattern-not-inside`, not `pattern-not`. With
      # `pattern-not` the automata builder hits an inconsistent-state bug
      # ("Automata without method enter contains end edges" —
      # `SemgrepRuleToAutomata.kt:82-84`).
      #
      # `$PRODUCES` is constrained by a co-located `metavariable-pattern`
      # under the same `patterns:` group; a sibling-level constraint
      # silently does not filter negative-scope bindings.
      - patterns:
          # Pair each return-type shape with its dedicated sink:
          #   - body-typed returns (String / ResponseEntity / CompletableFuture)
          #     feed the response via `return $UNTRUSTED;`
          #   - `DeferredResult<$T>` feeds the response via the wrapper's
          #     `$DR.setResult(tainted)` call before returning the wrapper.
          - pattern-either:
              - patterns:
                  - pattern-either:
                      # Body-typed returns whose default Content-Type can
                      # land on text/html. Ideally we'd discriminate
                      # `ResponseEntity<String>` / `<byte[]>` (DEFAULT-
                      # DANGEROUS) from `ResponseEntity<DTO>` /
                      # `ResponseEntity<Map<...>>` (DEFAULT-SAFE — Jackson
                      # serializes as JSON). The engine has a documented
                      # gap on concrete type-arg discrimination at the
                      # method-decl return position (see
                      # `RuleWithGenericByteArrayReturnType.java`'s honest
                      # negative), so all four alternatives below collapse
                      # to "any return type" today; the type list is
                      # forward-compatible declarative intent that will
                      # take effect once the engine gap closes.
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          String $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          ResponseEntity<String> $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          ResponseEntity<byte[]> $METHOD(...) {
                            ...
                          }
                      - pattern-inside: |
                          @$ANNOTATION(...)
                          CompletableFuture<$T> $METHOD(...) {
                            ...
                          }
                  - pattern: return $UNTRUSTED;
              - patterns:
                  - pattern-inside: |
                      @$ANNOTATION(...)
                      DeferredResult<$T> $METHOD(...) {
                        ...
                      }
                  - pattern: $DR.setResult(..., $UNTRUSTED, ...);
          - metavariable-pattern:
              metavariable: $ANNOTATION
              patterns:
                - pattern-either:
                    - pattern: GetMapping
                    - pattern: PostMapping
                    - pattern: PutMapping
                    - pattern: PatchMapping
                    - pattern: DeleteMapping
                    - pattern: RequestMapping
                    - pattern: ExceptionHandler
          # `image/svg+xml` is deliberately NOT excluded — SVG can host
          # inline `<script>` and execute.
          - patterns:
              - pattern-not-inside: |
                  @$ANNOTATION(..., produces = $PRODUCES, ...)
                  $RETURNTYPE $METHOD(...) { ... }
              - metavariable-pattern:
                  metavariable: $PRODUCES
                  patterns:
                    - pattern-either:
                        - pattern: '"application/json"'
                        - pattern: '"text/plain"'
                        - pattern: '"application/pdf"'
                        - pattern: '"application/octet-stream"'
                        - pattern: '"application/xml"'
                        - pattern: '"text/xml"'
                        - pattern: '"image/png"'
                        - pattern: '"image/jpeg"'
                        - pattern: '"image/gif"'
          - focus-metavariable: $UNTRUSTED

      # Branch 2: servlet-style writer — DEFAULT-SAFE shape, fires only
      # on an explicit text/html signal via `setContentType` (1-arg) or
      # `setHeader` / `addHeader` (2-arg with header name "Content-Type").
      #
      # `$CT_HTML` is placed INSIDE the source-pattern quotes (`"$CT_HTML"`)
      # so the metavar binds to the string-literal contents; a sibling
      # `metavariable-regex` then filters those contents. Placing the
      # metavar OUTSIDE the quotes (`$CT_HTML` matching the whole literal
      # expression) registers the constraint but the engine does not
      # consult it during matching — see the standalone repro at
      # `core/opentaint-java-querylang/samples/.../issues/`.
      #
      # The two writer-call arities (chained / local-var) cannot be
      # collapsed via a method-name metavar — engine issue 99 ("Method
      # name metavar constraints intersection"). They appear as two
      # alternatives in `pattern-either`.
      - patterns:
          - pattern-either:
              # setContentType (1-arg) + chained / local-var writer
              - pattern: |
                  (HttpServletResponse $R).setContentType("$CT_HTML");
                  ...
                  (HttpServletResponse $R).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  (HttpServletResponse $R).setContentType("$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              # setHeader (2-arg) + chained / local-var writer
              - pattern: |
                  (HttpServletResponse $R).setHeader("Content-Type", "$CT_HTML");
                  ...
                  (HttpServletResponse $R).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  (HttpServletResponse $R).setHeader("Content-Type", "$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
              # addHeader (2-arg) + chained / local-var writer
              - pattern: |
                  (HttpServletResponse $R).addHeader("Content-Type", "$CT_HTML");
                  ...
                  (HttpServletResponse $R).getWriter(...).$WRITE(..., $UNTRUSTED, ...);
              - pattern: |
                  (HttpServletResponse $R).addHeader("Content-Type", "$CT_HTML");
                  ...
                  $W = (HttpServletResponse $R).getWriter(...);
                  ...
                  $W.$WRITE(..., $UNTRUSTED, ...);
          - metavariable-regex:
              metavariable: $CT_HTML
              regex: '^text/html(\s*;.*)?$'
          - focus-metavariable: $UNTRUSTED
