name: Release GitHub Action

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major


concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: buildpack-deps:jammy-scm

    steps:
      - name: Install and configure applications
        run: |
          apt-get update
          apt-get install -yqq --no-install-recommends \
            nodejs \
            npm

      - name: Install GitHub CLI
        run: |
          (type -p wget >/dev/null || apt-get install -yqq wget) \
            && mkdir -p -m 755 /etc/apt/keyrings \
            && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            && cat $out | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && apt-get update \
            && apt-get install -yqq gh

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo
        run: |
          git status || git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Manual version bump
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        id: manual_release
        uses: ./.github/actions/manual-version-bump
        with:
          tag-prefix: 'github/v'
          bump-type: ${{ github.event.inputs.release_type }}

      - name: Push manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.manual_release.outputs.new-tag }}"
          git push origin "${{ steps.manual_release.outputs.new-tag }}"

          gh release create "${{ steps.manual_release.outputs.new-tag }}" \
            --title "${{ steps.manual_release.outputs.new-tag }}" \
            --generate-notes \
            --latest=false

      - name: Force-update tags
        run: git fetch --tags --force

      - name: Release (auto)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_type == 'auto' }}
        uses: cycjimmy/semantic-release-action@v4
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 23.0.0
          working_directory: github
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/exec@6.0.3
            conventional-changelog-conventionalcommits@7.0.2

      - name: Publish release as non-latest
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.version.outputs.new_release_published == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION="${{ steps.manual_release.outputs.new-version || steps.version.outputs.new_release_version }}"
          RELEASE_TAG="github/v$(echo "$RELEASE_VERSION" | sed 's/^v//')"
          RELEASE_ID=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" -q '.id')
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false \
            -f make_latest=false

      - name: Update floating version tags
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.version.outputs.new_release_published == 'true' }}
        uses: ./.github/actions/update-floating-tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          release-version: ${{ steps.manual_release.outputs.new-version || steps.version.outputs.new_release_version }}
          tag-prefix: 'github/'
          component-name: 'GitHub Action'

    outputs:
      release_version: ${{ steps.manual_release.outputs.new-version || steps.version.outputs.new_release_version }}
