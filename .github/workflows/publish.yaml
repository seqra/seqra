name: Analyzer release

on:
  workflow_dispatch:

  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types:
      - completed

env:
  DEPENDENCIES_VERSION: 2025.12.09.ac4f86b

jobs:
  publish:
    runs-on: [ self-hosted, ex44 ]

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    container: cruizba/ubuntu-dind:focal-25.0.3
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Setup Git
        run: apt update && apt install -y git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Generate version
        id: version
        run: echo "version=$(date +'%Y.%m.%d').$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_OUTPUT

      - name: Build analyzer jar
        run: ./gradlew :projectAnalyzerJar -PanalyzerVersion=${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Dependencies version
        run: |
          echo "DEPENDENCY_CONTEXT=sast-analyzer-dependencies:latest=docker-image://ghcr.io/${{ github.repository_owner }}/opentaint-infra-analyzer-dependencies/sast-analyzer-dependencies:${{ env.DEPENDENCIES_VERSION }}" >> $GITHUB_ENV

      - name: Build analyzer docker amd64 image
        run: ./gradlew :buildProjectAnalyzerDocker -PanalyzerVersion=${{ steps.version.outputs.version }} -PdockerPlatform=linux/amd64 -PdockerBuildContext="${{ env.DEPENDENCY_CONTEXT }}"

      - name: Build analyzer docker arm64 image
        run: ./gradlew :buildProjectAnalyzerDocker -PanalyzerVersion=${{ steps.version.outputs.version }} -PdockerPlatform=linux/arm64 -PdockerBuildContext="${{ env.DEPENDENCY_CONTEXT }}"

      - name: Create image names
        run: |
          echo "ANALYZER_IMAGE_AMD=ghcr.io/${{ github.repository_owner }}/opentaint-jvm-sast/sast-analyzer-amd64:${{ steps.version.outputs.version }}" >> $GITHUB_ENV
          echo "ANALYZER_IMAGE_ARM=ghcr.io/${{ github.repository_owner }}/opentaint-jvm-sast/sast-analyzer-arm64:${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Tag images
        run: |
          docker tag analyzer-private-linux-amd64:${{ steps.version.outputs.version }} ${{ env.ANALYZER_IMAGE_AMD }}
          docker tag analyzer-private-linux-arm64:${{ steps.version.outputs.version }} ${{ env.ANALYZER_IMAGE_ARM }}

      - name: Push images
        run: |
          docker push ${{ env.ANALYZER_IMAGE_AMD }}
          docker push ${{ env.ANALYZER_IMAGE_ARM }}

      - name: Upload analyzer jar
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          files: build/libs/opentaint-project-analyzer.jar
          make_latest: true

  publish-autobuilder:
    needs: publish
    runs-on: [ self-hosted, ex44 ]
    container: cruizba/ubuntu-dind:focal-25.0.3
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'corretto'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build autobuilder jar
        run: ./gradlew opentaint-jvm-autobuilder:projectAutoBuilderJar -PanalyzerVersion=${{ needs.publish.outputs.version }}

      - name: Attach autobuilder jar to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish.outputs.version }}
          files: opentaint-jvm-autobuilder/build/libs/opentaint-project-auto-builder.jar
