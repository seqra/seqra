name: Publish Infra Dependencies

on:
  workflow_dispatch:

  push:
    paths:
      - 'infra/**'
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [ self-hosted, ex44 ]
    container: cruizba/ubuntu-dind:focal-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: echo "version=$(date +'%Y.%m.%d').$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image names
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/infra/opentaint-dependencies:${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Build images
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64 -f infra/dependencies.Dockerfile -t ${{ env.IMAGE }} .
