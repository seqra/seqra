name: CI Dataflow

on:
  workflow_dispatch:

  push:
    paths:
      - 'core/opentaint-dataflow-core/**'
      - 'core/opentaint-ir/**'
      - 'core/opentaint-utils/**'
      - 'core/opentaint-configuration-rules/**'
      - 'core/opentaint-common-build/**'
      - '.github/workflows/ci-dataflow.yaml'
    branches: [ "main" ]
  pull_request:
    paths:
      - 'core/opentaint-dataflow-core/**'
      - 'core/opentaint-ir/**'
      - 'core/opentaint-utils/**'
      - 'core/opentaint-configuration-rules/**'
      - 'core/opentaint-common-build/**'
      - '.github/workflows/ci-dataflow.yaml'
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    container: gitlab/gitlab-runner-helper:ubuntu-x86_64-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew opentaint-dataflow-core:check
        working-directory: core

      - name: Upload Gradle reports
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-ci-dataflow
          path: '**/build/reports/'
          retention-days: 1
