name: CI Dataflow

on:
  workflow_dispatch:

  push:
    paths:
      - 'opentaint-core/opentaint-dataflow-core/**'
    branches: [ "main" ]
  pull_request:
    paths:
      - 'opentaint-core/opentaint-dataflow-core/**'
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [ self-hosted, ex44 ]
    container: gitlab/gitlab-runner-helper:ubuntu-x86_64-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew opentaint-dataflow-core:check
        working-directory: opentaint-core

      - name: Upload Gradle reports
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-ci-dataflow
          path: '**/build/reports/'
          retention-days: 1
