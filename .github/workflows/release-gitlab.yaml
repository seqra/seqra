name: Release GitLab

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

  push:
    paths:
      - 'opentaint-gitlab/**'
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: [ self-hosted, ex44 ]
    container: buildpack-deps:jammy-scm

    steps:
      - name: Install and configure applications
        run: |
          apt-get update
          apt-get install -yqq --no-install-recommends \
            nodejs \
            npm

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo for release
        run: |
          git status || git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Manual version bump
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        id: manual_release
        uses: ./.github/actions/manual-version-bump
        with:
          tag-prefix: 'gitlab/v'
          bump-type: ${{ github.event.inputs.release_type }}

      - name: Push manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.manual_release.outputs.new-tag }}"
          git push origin "${{ steps.manual_release.outputs.new-tag }}"

          gh release create "${{ steps.manual_release.outputs.new-tag }}" \
            --title "${{ steps.manual_release.outputs.new-tag }}" \
            --generate-notes \
            --latest=false

          echo "v${{ steps.manual_release.outputs.new-version }}" > opentaint-gitlab/release_version.txt

      - name: Release (auto)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_type == 'auto' }}
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 23.0.0
          working_directory: opentaint-gitlab
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/exec@6.0.3
            conventional-changelog-conventionalcommits@7.0.2

      - name: Get release_version and pass to next job
        if: ${{ steps.manual_release.outputs.new-version == '' }}
        id: release_version
        working-directory: opentaint-gitlab
        run: |
          if [ -f release_version.txt ]; then
            echo "status=succeeded" >>"$GITHUB_OUTPUT"
            echo "RELEASE_VERSION=$(cat release_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >>"$GITHUB_OUTPUT"
          fi
          rm -f release_version.txt

      - name: Update floating latest tag
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.release_version.outputs.status == 'succeeded' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "gitlab/latest"
          git push origin "gitlab/latest" --force

          gh release delete "gitlab/latest" --yes || true
          gh release create "gitlab/latest" \
            --title "gitlab/latest" \
            --notes "Floating release tracking the latest GitLab CI template version" \
            --latest=false \
            --prerelease

    outputs:
      release_version: ${{ steps.manual_release.outputs.new-version || steps.release_version.outputs.RELEASE_VERSION }}
