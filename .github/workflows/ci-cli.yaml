name: CI CLI

on:
  push:
    paths:
      - 'cli/**'
      - 'scripts/**'
      - '.github/workflows/ci-cli.yaml'
    branches:
      - main
  pull_request:
    paths:
      - 'cli/**'
      - 'scripts/**'
      - '.github/workflows/ci-cli.yaml'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'
  GOLANGCI_LINT_VERSION: v2.7
  STIRLING_PDF_VERSION: 'v2.5.3'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix git safe directory
        uses: ./.github/actions/cli/fix-git-safe-directory

      - name: Build and lint
        uses: ./.github/actions/cli/build-and-lint
        with:
          GO_VERSION: ${{ env.GO_VERSION }}
          GOLANGCI_LINT_VERSION: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run all tests
        working-directory: cli
        run: |
          go test ./... -v -count=1

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean
          workdir: cli
        env:
          HOMEBREW_TAP_OWNER: ${{ github.repository_owner }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

  run-on-petclinic-without-installed-java-17:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTaint
        uses: ./.github/actions/cli/setup-opentaint
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set GitHub token arg
        id: github-token
        uses: ./.github/actions/cli/github-token-arg
        with:
          github-token: ${{ secrets.SEQRA_GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          path: project-root-java-11
          ref: a5cbb8505a1df3c348c06607933a07fc8c87c222
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run opentaint scan in native environment when user can build project but has no java 17+
        working-directory: cli
        run: |
          ./opentaint scan --debug ${{ steps.github-token.outputs.arg }} --output report.sarif ../project-root-java-11

  run-on-petclinic:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTaint
        uses: ./.github/actions/cli/setup-opentaint

      - name: Set GitHub token arg
        id: github-token
        uses: ./.github/actions/cli/github-token-arg
        with:
          github-token: ${{ secrets.SEQRA_GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          path: project-root
          ref: 30aab0ae764ad845b5eedd76028756835fec771f
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run opentaint separate compile and scan
        working-directory: cli
        run: |
          ./opentaint compile --quiet --debug ${{ steps.github-token.outputs.arg }} --output portable-project ../project-root
          ./opentaint scan --quiet --debug ${{ steps.github-token.outputs.arg }} --output report.sarif --project-model portable-project

      - name: Run opentaint scan with explicit path and output
        working-directory: cli
        run: |
          ./opentaint scan --quiet ${{ steps.github-token.outputs.arg }} --output report.sarif ../project-root

      - name: Clean up cached models before default-output tests
        working-directory: cli
        run: ./opentaint prune --yes ${{ steps.github-token.outputs.arg }}

      - name: Run opentaint scan with default output (CompileAndScan)
        working-directory: cli
        run: |
          ./opentaint scan --quiet ${{ steps.github-token.outputs.arg }} ../project-root

      - name: Verify cached model and default SARIF location
        run: |
          # Exactly one project cache directory should exist
          MODEL_COUNT=$(ls -d ~/.opentaint/cache/*/ 2>/dev/null | wc -l)
          if [ "$MODEL_COUNT" -ne 1 ]; then
            echo "Expected 1 cached model directory, found $MODEL_COUNT"
            ls -la ~/.opentaint/cache/ || true
            exit 1
          fi

          CACHE_DIR=$(ls -d ~/.opentaint/cache/*/)

          # project-model directory should exist
          if [ ! -d "${CACHE_DIR}project-model" ]; then
            echo "Expected project-model directory in $CACHE_DIR"
            ls -la "$CACHE_DIR"
            exit 1
          fi

          # Default SARIF should be inside project-model/sources/
          SARIF_PATH="${CACHE_DIR}project-model/sources/opentaint.sarif"
          if [ ! -f "$SARIF_PATH" ]; then
            echo "Expected default SARIF at $SARIF_PATH"
            find "$CACHE_DIR" -name "*.sarif" || true
            exit 1
          fi

          echo "Cached model verified at: $CACHE_DIR"
          echo "Default SARIF verified at: $SARIF_PATH"

      - name: Run opentaint scan with no arguments (defaults to current directory)
        working-directory: project-root
        run: |
          ../cli/opentaint scan --quiet ${{ steps.github-token.outputs.arg }}

      - name: Run opentaint scan on pre-compiled model without --output
        working-directory: cli
        run: |
          ./opentaint scan --quiet ${{ steps.github-token.outputs.arg }} --project-model portable-project

      - name: Verify SARIF placed inside provided project-model
        working-directory: cli
        run: |
          if [ ! -f "portable-project/sources/opentaint.sarif" ]; then
            echo "Expected SARIF at portable-project/sources/opentaint.sarif"
            find portable-project -name "*.sarif" || true
            exit 1
          fi
          echo "SARIF in explicit project-model verified"

      - name: Run opentaint prune --dry-run and verify cached models listed
        working-directory: cli
        run: |
          OUTPUT=$(./opentaint prune --dry-run 2>&1)
          if ! echo "$OUTPUT" | grep -q "model"; then
            echo "Expected prune --dry-run to list cached model artifacts"
            echo "$OUTPUT"
            exit 1
          fi
          echo "Prune dry-run correctly lists cached models"

      - name: Run opentaint prune --yes and verify cached models removed
        working-directory: cli
        run: |
          ./opentaint prune --yes
          if [ -d ~/.opentaint/cache ] && [ "$(ls -A ~/.opentaint/cache 2>/dev/null)" ]; then
            echo "Expected cache directory to be empty after prune"
            ls -la ~/.opentaint/cache/
            exit 1
          fi
          echo "Prune correctly removed cached models"

  run-on-petclinic-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup opentaint
        uses: ./.github/actions/cli/setup-opentaint

      - name: Set GitHub token arg
        id: github-token
        shell: pwsh
        run: |
          $TOKEN_ARG = ""
          if ("${{ secrets.SEQRA_GITHUB_TOKEN }}") {
            $TOKEN_ARG = "--github-token ${{ secrets.SEQRA_GITHUB_TOKEN }}"
          }
          $TOKEN_ARG = "$TOKEN_ARG --owner ${{ github.repository_owner }} --repo ${{ github.event.repository.name }}"
          echo "arg=$TOKEN_ARG" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          repository: spring-projects/spring-petclinic
          path: project-root
          ref: 30aab0ae764ad845b5eedd76028756835fec771f
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run opentaint separate compile and scan
        working-directory: cli
        run: |
          ./opentaint compile --quiet --debug ${{ steps.github-token.outputs.arg }} --output portable-project ../project-root
          ./opentaint scan --quiet --debug ${{ steps.github-token.outputs.arg }} --output report.sarif --project-model portable-project

      - name: Run opentaint scan
        working-directory: cli
        run: |
          ./opentaint scan --quiet ${{ steps.github-token.outputs.arg }} --output report.sarif ../project-root

  scan-stirling-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup opentaint
        uses: ./.github/actions/cli/setup-opentaint
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set GitHub token arg
        id: github-token
        uses: ./.github/actions/cli/github-token-arg
        with:
          github-token: ${{ secrets.SEQRA_GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Stirling-PDF JAR
        working-directory: cli
        run: |
          mkdir -p stirling-pdf
          curl -L -o stirling-pdf/Stirling-PDF.jar "https://github.com/Stirling-Tools/Stirling-PDF/releases/download/${STIRLING_PDF_VERSION}/Stirling-PDF.jar"

      - name: Create project model
        working-directory: cli
        run: |
          mkdir -p stirling-pdf/src
          ./opentaint project ${{ steps.github-token.outputs.arg }} --output stirling-pdf-model --source-root stirling-pdf/src --classpath stirling-pdf/Stirling-PDF.jar --package stirling.software

      - name: Run opentaint scan
        working-directory: cli
        run: |
          ./opentaint scan ${{ steps.github-token.outputs.arg }} --output stirling-pdf-report.sarif --project-model stirling-pdf-model

  test-install-sh-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build test archive
        uses: ./.github/actions/cli/build-test-archive
      - name: Serve test archive
        uses: ./.github/actions/cli/serve-archive
        with:
          archive-dir: cli
      - name: Run install.sh
        id: install-linux
        env:
          OPENTAINT_DOWNLOAD_BASE_URL: http://127.0.0.1:8080
        run: bash scripts/ci/run-installer-sh.sh scripts/install/install.sh
      - name: Verify installation
        uses: ./.github/actions/cli/verify-installed-binary
        with:
          binary-path: ${{ steps.install-linux.outputs.OPENTAINT_BINARY_PATH }}

  test-install-sh-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build test archive
        uses: ./.github/actions/cli/build-test-archive
      - name: Serve test archive
        uses: ./.github/actions/cli/serve-archive
        with:
          archive-dir: cli
      - name: Run install.sh
        id: install-macos
        env:
          OPENTAINT_DOWNLOAD_BASE_URL: http://127.0.0.1:8080
        run: bash scripts/ci/run-installer-sh.sh scripts/install/install.sh
      - name: Verify installation
        uses: ./.github/actions/cli/verify-installed-binary
        with:
          binary-path: ${{ steps.install-macos.outputs.OPENTAINT_BINARY_PATH }}

  test-install-ps1:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build test archive
        uses: ./.github/actions/cli/build-test-archive
      # Server start, readiness poll and install must share a single step:
      # on windows-latest the runner's Job Object kills background processes
      # at step end, so the python server cannot live across steps.
      - name: Serve archive and run install.ps1
        id: install-windows
        shell: pwsh
        env:
          OPENTAINT_DOWNLOAD_BASE_URL: http://127.0.0.1:8080
          SERVE_PORT: '8080'
          SERVE_TIMEOUT: '30'
        run: |
          $port = [int]$env:SERVE_PORT
          $logOut = Join-Path $env:RUNNER_TEMP 'http-server.out.log'
          $logErr = Join-Path $env:RUNNER_TEMP 'http-server.err.log'
          $server = Start-Process -NoNewWindow -PassThru `
            -FilePath python `
            -ArgumentList '-m', 'http.server', "$port" `
            -WorkingDirectory cli `
            -RedirectStandardOutput $logOut `
            -RedirectStandardError $logErr
          try {
            & "$env:GITHUB_WORKSPACE/scripts/ci/wait-for-http-server.ps1" `
              -Url "http://127.0.0.1:$port/" `
              -TimeoutSec ([int]$env:SERVE_TIMEOUT) `
              -Process $server `
              -StdoutLog $logOut `
              -StderrLog $logErr
            & "$env:GITHUB_WORKSPACE/scripts/ci/run-installer-pwsh.ps1" `
              -Script scripts/install/install.ps1
          } finally {
            if ($server -and -not $server.HasExited) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            }
          }
      - name: Verify installation
        uses: ./.github/actions/cli/verify-installed-binary
        with:
          binary-path: ${{ steps.install-windows.outputs.OPENTAINT_BINARY_PATH }}
