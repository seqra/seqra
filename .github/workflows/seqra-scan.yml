name: Seqra Scan

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  STIRLING_PDF_VERSION: 'v2.5.3'

jobs:
  scan-stirling-pdf:
    runs-on: ubuntu-latest
    container: golang:1.25

    steps:
      - uses: actions/checkout@v6

      - name: Setup seqra
        uses: ./.github/actions/setup-seqra

      - name: Set GitHub token arg
        id: github-token
        run: |
          TOKEN_ARG=""
          if [ -n "${{ secrets.SEQRA_GITHUB_TOKEN }}" ]; then
            TOKEN_ARG="--github-token ${{ secrets.SEQRA_GITHUB_TOKEN }}"
          fi
          echo "arg=$TOKEN_ARG" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Stirling-PDF JAR
        run: |
          mkdir -p stirling-pdf
          curl -L -o stirling-pdf/Stirling-PDF.jar "https://github.com/Stirling-Tools/Stirling-PDF/releases/download/${STIRLING_PDF_VERSION}/Stirling-PDF.jar"

      - name: Create project model
        run: |
          mkdir -p stirling-pdf/src
          ./seqra project ${{ steps.github-token.outputs.arg }} --output stirling-pdf-model --source-root stirling-pdf/src --classpath stirling-pdf/Stirling-PDF.jar --package stirling.software

      - name: Run seqra scan
        run: |
          ./seqra scan ${{ steps.github-token.outputs.arg }} --output stirling-pdf-report.sarif stirling-pdf-model
