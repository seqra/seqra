name: Release

on:
  push:
    branches:
      - main
      - 'release/**'
env:
  SEQRA_DEPENDENCIES_VERSION: 2026.01.30.4312b72

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: 'Release'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 23.0.0
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/exec@6.0.3
            conventional-changelog-conventionalcommits@7.0.2
      -
        name: 'Get release_version and pass to next job'
        id: release_version
        # see .releaserc.json to obtain certain file name
        run: |
          if [ -f release_version.txt ]; then
            echo "status=succeeded" >>"$GITHUB_OUTPUT"
            echo "RELEASE_VERSION=$(cat release_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >>"$GITHUB_OUTPUT"
          fi
          rm -f release_version.txt
      -
        name: Login to GitHub Container Registry
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.SEQRA_GITHUB_ACTOR }}
          password: ${{ secrets.SEQRA_GITHUB_TOKEN }}
      -
        name: Set up QEMU
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: docker/setup-buildx-action@v3
      -
        name: Set up Go
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.0'
      -
        name: Docker meta
        id: meta
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release_version.outputs.RELEASE_VERSION }}
      -
        name: Download bundled artifacts
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        env:
          GH_TOKEN: ${{ secrets.SEQRA_GITHUB_TOKEN }}
        run: |
          ANALYZER_VERSION=$(grep '^analyzer:' internal/globals/versions.yaml | awk '{print $2}' | tr -d '"')
          AUTOBUILDER_VERSION=$(grep '^autobuilder:' internal/globals/versions.yaml | awk '{print $2}' | tr -d '"')
          RULES_VERSION=$(grep '^rules:' internal/globals/versions.yaml | awk '{print $2}' | tr -d '"')

          mkdir -p lib

          echo "Downloading analyzer ${ANALYZER_VERSION}..."
          gh release download "${ANALYZER_VERSION}" \
            --repo seqra/seqra-jvm-sast \
            --pattern "seqra-project-analyzer.jar" \
            --dir lib

          echo "Downloading autobuilder ${AUTOBUILDER_VERSION}..."
          gh release download "${AUTOBUILDER_VERSION}" \
            --repo seqra/seqra-jvm-autobuilder \
            --pattern "seqra-project-auto-builder.jar" \
            --dir lib

          echo "Downloading rules ${RULES_VERSION}..."
          gh release download "${RULES_VERSION}" \
            --repo seqra/seqra-rules \
            --pattern "seqra-rules.tar.gz" \
            --dir /tmp

          mkdir -p lib/rules
          tar -xzf /tmp/seqra-rules.tar.gz -C lib/rules

          echo "Bundled artifacts:"
          ls -la lib/
      -
        name: Run GoReleaser
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
      -
        name: Bundle JREs into release archives
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/bundle-jre.sh dist
          RELEASE_TAG="v${{ steps.release_version.outputs.RELEASE_VERSION }}"
          for archive in dist/seqra_*.tar.gz dist/seqra_*.zip; do
            [ -f "$archive" ] || continue
            echo "Re-uploading $archive..."
            gh release upload "$RELEASE_TAG" "$archive" --clobber
          done
          # Regenerate checksums
          cd dist
          sha256sum seqra_*.tar.gz seqra_*.zip 2>/dev/null > checksums.txt
          cd ..
          gh release upload "$RELEASE_TAG" dist/checksums.txt --clobber
      -
        name: Build and push
        if: ${{ steps.release_version.outputs.status == 'succeeded' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-contexts: |
            seqra-dependencies:latest=docker-image://ghcr.io/${{ github.repository_owner }}/seqra-infra-dependencies/seqra-dependencies:${{ env.SEQRA_DEPENDENCIES_VERSION }}
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.SEQRA_GITHUB_TOKEN }}
          build-args: |
            SEQRA_BUILD_FLAGS=-s -w -X github.com/seqra/seqra/v2/internal/version.Version=${{ steps.release_version.outputs.RELEASE_VERSION }}

    outputs:
      release_version: ${{ steps.release_version.outputs.RELEASE_VERSION }}
