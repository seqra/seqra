name: Publish Autobuilder

on:
  workflow_dispatch:

  workflow_run:
    workflows: [ "CI Autobuilder" ]
    branches: [ main ]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [ self-hosted, ex44 ]
    container: cruizba/ubuntu-dind:focal-25.0.3

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Setup Git
        run: apt update && apt install -y git

      - name: Install GitHub CLI
        run: |
          (type -p wget >/dev/null || apt-get install -yqq wget) \
            && mkdir -p -m 755 /etc/apt/keyrings \
            && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            && cat $out | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && apt-get update \
            && apt-get install -yqq gh

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for autobuilder changes
        id: changes
        uses: ./.github/actions/check-scoped-commits
        with:
          scopes: autobuilder,core
          tag-prefix: 'autobuilder/'

      - name: Set up JDK 8
        if: steps.changes.outputs.has-changes == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'corretto'

      - name: Set up Gradle
        if: steps.changes.outputs.has-changes == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build autobuilder jar
        if: steps.changes.outputs.has-changes == 'true'
        working-directory: opentaint-core
        run: ./gradlew opentaint-jvm-autobuilder:projectAutoBuilderJar -PanalyzerVersion=${{ steps.changes.outputs.version }}

      - name: Upload autobuilder jar
        if: steps.changes.outputs.has-changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: autobuilder/${{ steps.changes.outputs.version }}
          tag_name: autobuilder/${{ steps.changes.outputs.version }}
          body: ${{ steps.changes.outputs.release-notes }}
          files: opentaint-core/opentaint-jvm-autobuilder/build/libs/opentaint-project-auto-builder.jar
          make_latest: false

      - name: Update floating latest tag
        if: steps.changes.outputs.has-changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "autobuilder/latest"
          git push origin "autobuilder/latest" --force

      - name: Update autobuilder/latest release
        if: steps.changes.outputs.has-changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "autobuilder/latest" --yes || true
          gh release create "autobuilder/latest" \
            --title "autobuilder/latest" \
            --notes "Floating release tracking the latest autobuilder build (${{ steps.changes.outputs.version }})" \
            --latest=false \
            --prerelease \
            opentaint-core/opentaint-jvm-autobuilder/build/libs/opentaint-project-auto-builder.jar
