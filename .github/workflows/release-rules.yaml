name: Release Rules

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

  push:
    paths:
      - 'opentaint-rules/**'
    branches:
      - main

jobs:
  release:
    runs-on: [ self-hosted, ex44 ]
    container: buildpack-deps:jammy-scm
    permissions:
      contents: write

    steps:
      - name: Install and configure applications
        run: |
          apt-get update
          apt-get install -yqq --no-install-recommends \
            nodejs \
            npm

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo for release
        run: |
          git status || git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Create rules archive
        run: |
          cd opentaint-rules/rules; tar cfvz ../../seqra-rules.tar.gz .

      - name: Manual release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        id: manual_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_PREFIX="rules/v"
          BUMP_TYPE="${{ github.event.inputs.release_type }}"

          LATEST_TAG=$(git tag -l "${TAG_PREFIX}*" --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_VERSION="0.0.0"
          else
            LATEST_VERSION="${LATEST_TAG#${TAG_PREFIX}}"
          fi

          IFS='.' read -r major minor patch <<< "$LATEST_VERSION"
          case "$BUMP_TYPE" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEW_VERSION="${major}.${minor}.${patch}"
          NEW_TAG="${TAG_PREFIX}${NEW_VERSION}"

          echo "Bumping ${LATEST_TAG:-none} -> $NEW_TAG ($BUMP_TYPE)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --generate-notes \
            --latest=false \
            seqra-rules.tar.gz

          echo "v${NEW_VERSION}" > opentaint-rules/release_version.txt
          echo "status=succeeded" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Release (auto)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_type == 'auto' }}
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 23.0.0
          working_directory: opentaint-rules
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/exec@6.0.3
            conventional-changelog-conventionalcommits@7.0.2

      - name: Get release_version and pass to next job
        if: ${{ steps.manual_release.outputs.status != 'succeeded' }}
        id: release_version
        working-directory: opentaint-rules
        run: |
          if [ -f release_version.txt ]; then
            echo "status=succeeded" >>"$GITHUB_OUTPUT"
            echo "RELEASE_VERSION=$(cat release_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >>"$GITHUB_OUTPUT"
          fi
          rm -f release_version.txt

      - name: Update floating latest tag
        if: ${{ steps.manual_release.outputs.status == 'succeeded' || steps.release_version.outputs.status == 'succeeded' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "rules/latest"
          git push origin "rules/latest" --force

    outputs:
      release_version: ${{ steps.manual_release.outputs.RELEASE_VERSION || steps.release_version.outputs.RELEASE_VERSION }}
