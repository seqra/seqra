name: Release Rules

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major


concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    container: buildpack-deps:jammy-scm

    permissions:
      contents: write

    steps:
      - name: Install and configure applications
        run: |
          apt-get update
          apt-get install -yqq --no-install-recommends \
            nodejs \
            npm

      - name: Install GitHub CLI
        run: |
          (type -p wget >/dev/null || apt-get install -yqq wget) \
            && mkdir -p -m 755 /etc/apt/keyrings \
            && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            && cat $out | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && apt-get update \
            && apt-get install -yqq gh

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix repo for release
        run: |
          git status || git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Create rules archive
        run: |
          cd rules/ruleset; tar cfvz ../../opentaint-rules.tar.gz .

      - name: Manual version bump
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        id: manual_release
        uses: ./.github/actions/manual-version-bump
        with:
          tag-prefix: 'rules/v'
          bump-type: ${{ github.event.inputs.release_type }}

      - name: Push manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_type != 'auto' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.manual_release.outputs.new-tag }}"
          git push origin "${{ steps.manual_release.outputs.new-tag }}"

          gh release create "${{ steps.manual_release.outputs.new-tag }}" \
            --title "${{ steps.manual_release.outputs.new-tag }}" \
            --generate-notes \
            --latest=false \
            opentaint-rules.tar.gz

          echo "v${{ steps.manual_release.outputs.new-version }}" > rules/release_version.txt

      - name: Force-update tags
        run: git fetch --tags --force

      - name: Release (auto)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_type == 'auto' }}
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 23.0.0
          working_directory: rules
          extra_plugins: |
            @semantic-release/commit-analyzer@11.1.0
            @semantic-release/exec@6.0.3
            conventional-changelog-conventionalcommits@7.0.2

      - name: Get release_version and pass to next job
        if: ${{ steps.manual_release.outputs.new-version == '' }}
        id: release_version
        working-directory: rules
        run: |
          if [ -f release_version.txt ]; then
            echo "status=succeeded" >>"$GITHUB_OUTPUT"
            echo "RELEASE_VERSION=$(cat release_version.txt)" >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >>"$GITHUB_OUTPUT"
          fi
          rm -f release_version.txt

      - name: Unmark release as latest
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.release_version.outputs.status == 'succeeded' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION="${{ steps.manual_release.outputs.new-version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ steps.release_version.outputs.RELEASE_VERSION }}"
          fi
          RELEASE_TAG="rules/v$(echo "$RELEASE_VERSION" | sed 's/^v//')"
          gh release edit "$RELEASE_TAG" --latest=false

      - name: Update floating latest tag
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.release_version.outputs.status == 'succeeded' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "rules/latest"
          git push origin "rules/latest" --force

          LATEST_VERSION="${{ steps.manual_release.outputs.new-version }}"
          if [ -n "$LATEST_VERSION" ]; then
            LATEST_VERSION="v${LATEST_VERSION}"
          else
            LATEST_VERSION="${{ steps.release_version.outputs.RELEASE_VERSION }}"
          fi

          gh release delete "rules/latest" --yes || true
          gh release create "rules/latest" \
            --title "rules/latest" \
            --notes "Floating release tracking the latest rules version (${LATEST_VERSION})" \
            --latest=false \
            --prerelease \
            opentaint-rules.tar.gz

      - name: Update floating minor version tag
        if: ${{ steps.manual_release.outputs.new-version != '' || steps.release_version.outputs.status == 'succeeded' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION="${{ steps.manual_release.outputs.new-version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ steps.release_version.outputs.RELEASE_VERSION }}"
          fi
          RELEASE_VERSION="$(echo "$RELEASE_VERSION" | sed 's/^v//')"
          MINOR_TAG="rules/v$(echo "$RELEASE_VERSION" | cut -d. -f1-2)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MINOR_TAG"
          git push origin "$MINOR_TAG" --force

          gh release delete "$MINOR_TAG" --yes || true
          gh release create "$MINOR_TAG" \
            --title "$MINOR_TAG" \
            --notes "Floating release tracking the latest rules ${MINOR_TAG#rules/}.x version (rules/v${RELEASE_VERSION})" \
            --latest=false \
            --prerelease \
            opentaint-rules.tar.gz

    outputs:
      release_version: ${{ steps.manual_release.outputs.new-version || steps.release_version.outputs.RELEASE_VERSION }}
