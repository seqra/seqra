version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/seqra/seqra/v2/internal/version.Version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: lib/**/*
        dst: lib/
        strip_parent: true

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  prerelease: auto

homebrew_casks:
  - name: seqra
    binaries:
      - seqra
    repository:
      owner: seqra
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/seqra/seqra"
    description: "CLI security analysis tool for Java and Kotlin projects"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/seqra"]

scoops:
  - repository:
      owner: seqra
      name: scoop-seqra
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/seqra/seqra"
    description: "CLI security analysis tool for Java and Kotlin projects"
    license: "Proprietary"
