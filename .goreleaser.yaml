version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/seqra/seqra/v2/internal/version.Version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: lib/**/*
        dst: lib/
        strip_parent: true

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

release:
  prerelease: auto

brews:
  - repository:
      owner: seqra
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/seqra/seqra"
    description: "CLI security analysis tool for Java and Kotlin projects"
    license: "Proprietary"
    install: |
      bin.install "seqra"
      (lib/"seqra").install Dir["lib/*"] if File.directory?("lib")
      (lib/"seqra/jre").install Dir["jre/*"] if File.directory?("jre")
    test: |
      system "#{bin}/seqra", "--version"

scoops:
  - repository:
      owner: seqra
      name: scoop-seqra
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/seqra/seqra"
    description: "CLI security analysis tool for Java and Kotlin projects"
    license: "Proprietary"
