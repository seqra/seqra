library: org.springframework:spring-core:4.3.30.RELEASE
passThrough:
- function: org.springframework.util.StringUtils#mergeStringArrays
  copy:
  - from: arg(0)
    to: result
  - from: arg(1)
    to: result
- function: org.springframework.util.StringUtils#mergeStringArrays
  overrides: false
  copy:
  - from:
    - arg(0)
    - '[*]'
    to:
    - result
    - '[*]'
  - from:
    - arg(1)
    - '[*]'
    to:
    - result
    - '[*]'
