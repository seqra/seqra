library: org.springframework.boot:spring-boot-health:4.0.2
passThrough:
- function: org.springframework.boot.health.contributor.Status#getDescription
  copy:
  - from:
    - this
    - .org.springframework.boot.health.contributor.Status#description#java.lang.Object
    to: result
- function: org.springframework.boot.health.contributor.Status#<init>
  copy:
  - from: arg(1)
    to:
    - this
    - .org.springframework.boot.health.contributor.Status#description#java.lang.Object
  - from: arg(0)
    to:
    - this
    - .org.springframework.boot.health.contributor.Status#code#java.lang.Object
- function: org.springframework.boot.health.contributor.Status#getCode
  copy:
  - from:
    - this
    - .org.springframework.boot.health.contributor.Status#code#java.lang.Object
    to: result
