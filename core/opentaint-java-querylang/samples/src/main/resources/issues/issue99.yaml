rules:
  - id: i99
    message: >
      Sibling pattern-inside placed at the wrong indentation level
      (alongside pattern-either rather than inside it) interacts
      pathologically with `pattern-not-inside` + `metavariable-regex`
      and causes the subtractor to over-fire on samples whose content
      does not match the regex. Removing the bug-trigger sibling
      pattern-inside (for the placeholder `Response2`) restores correct
      discrimination. See issue99.java for full context and the
      motivating `servlet-xss-html-response-sinks.yaml` shape.
    severity: ERROR
    languages:
      - java
    mode: taint
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - patterns:
          - patterns:
              - pattern-either:
                - pattern-inside: |
                    $RT $METHOD(..., Response $R, ...) {
                      ...
                    }
              # Indentation bug: this pattern-inside is at the SAME level as
              # `pattern-either`, not inside it — making it a required AND
              # conjunct instead of an OR alternative. Demonstrates the
              # `servlet-xss-html-response-sinks.yaml` entrypoint shape.
              - pattern-inside: |
                  $RT $METHOD(..., Response2 $R, ...) {
                    ...
                  }
              - metavariable-pattern:
                  metavariable: $METHOD
                  pattern-either:
                    - pattern: doStuff
          - patterns:
              - pattern-inside: |
                  $W = $R.getWriter();
                  ...
              - pattern: $W.write($UNTRUSTED)
          - patterns:
              - pattern-not-inside: |
                  $R.setHtmlType("$V");
                  ...
              - metavariable-regex:
                  metavariable: $V
                  regex: '^application/json$'
          - focus-metavariable: $UNTRUSTED
