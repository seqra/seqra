rules:
  - id: i98
    message: >
      pattern-not-inside silently ignored when the pattern constrains call
      arguments, even with every metavariable bound by a sibling positive
      pattern. See issue98.java for the demonstration and the motivating
      XSS rule context (`servlet-xss-html-response-sinks.yaml` subtractor on
      `(HttpServletResponse $R).setContentType("application/json"); ...`).
    severity: ERROR
    languages:
      - java
    mode: taint
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - patterns:
          - pattern-inside: |
              $RETURNTYPE $METHOD(...) {
                ...
              }
          - pattern-not-inside: $X.cfg("Content-Type", "application/json")
          - pattern: $X.sink($UNTRUSTED)
          - focus-metavariable: $UNTRUSTED
