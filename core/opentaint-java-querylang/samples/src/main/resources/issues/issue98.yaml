rules:
  - id: i98
    message: >
      Chained-expression pattern-not-inside is ignored when the pattern
      constrains the call arity with literal or metavariable args. The same
      pattern with variadic args (`$X.cfg(...)`) is honored. See
      issue98.java for the demonstration and motivating XSS rule context.
    severity: ERROR
    languages:
      - java
    mode: taint
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - patterns:
          - pattern-not-inside: $X.cfg("Content-Type", "application/json")
          - pattern: $B.sink($UNTRUSTED)
          - focus-metavariable: $UNTRUSTED
