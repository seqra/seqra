rules:
  - id: sink
    options:
      lib: true
    severity: NOTE
    message: Direct write of unvalidated user input into response
    languages:
      - java
    mode: taint
    pattern-sinks:
      - patterns:
        - pattern: |
            (Response $RESPONSE).getTaker(...).$WRITE(..., $UNTRUSTED, ...)
        - focus-metavariable: $UNTRUSTED
