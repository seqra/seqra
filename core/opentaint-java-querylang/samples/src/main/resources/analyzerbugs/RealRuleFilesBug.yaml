rules:
  - id: real-rule-files-bug
    languages:
      - java
    severity: ERROR
    message: tainted path reaches a Files NIO sink
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $UNTRUSTED = $REQ.getParameter(...);
          - focus-metavariable: $UNTRUSTED
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: java.nio.file.Files.readAllBytes($F, ...)
              - pattern: java.nio.file.Files.writeString($F, ...)
          - focus-metavariable: $F
