rules:
  - id: files-writeString-join-bug
    severity: ERROR
    message: tainted path reaches a Files NIO sink
    languages:
      - java
    mode: join
    join:
      refs:
        - rule: untrusted-data
          as: untrusted-data
        - rule: path-traversal-sinks
          as: sink
      rules:
        - id: untrusted-data
          message: untrusted-data source
          severity: NOTE
          languages:
            - java
          patterns:
            - pattern: $UNTRUSTED = $REQ.getParameter(...)
            - focus-metavariable: $UNTRUSTED

        - id: path-traversal-sinks
          message: NIO Files sink
          severity: NOTE
          languages:
            - java
          mode: taint
          pattern-sinks:
            - patterns:
                - pattern-either:
                    - pattern: java.nio.file.Files.readAllBytes($FILE, ...)
                    - pattern: java.nio.file.Files.write($FILE, ...)
                    - pattern: java.nio.file.Files.writeString($FILE, ...)
                - focus-metavariable: $FILE
      on:
        - 'untrusted-data.$UNTRUSTED -> sink.$FILE'
