rules:
  - id: sink-pattern-bug
    languages:
      - java
    severity: ERROR
    message: tainted path reaches a Files-like sink
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $X = src();
          - focus-metavariable: $X
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: analyzerbugs.SinkPatternBug.FilesLike.readPath($F, ...)
              - pattern: analyzerbugs.SinkPatternBug.FilesLike.writePath($F, ...)
          - focus-metavariable: $F
