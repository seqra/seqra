rules:
  - id: servlet-param-source-bug
    languages:
      - java
    severity: ERROR
    message: tainted assignment reaches sink
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: |
              $UNTRUSTED = (FakeReq $REQ).$METHOD(...);
          - metavariable-regex:
              metavariable: $METHOD
              regex: getQueryString
    pattern-sinks:
      - patterns:
          - pattern: sink($Y);
          - focus-metavariable: $Y
