rules:
  - id: sanitizer-overload-bug
    languages:
      - java
    severity: ERROR
    message: tainted reaches sink
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $X = src();
          - focus-metavariable: $X
    pattern-sinks:
      - patterns:
          - pattern: sink($Y);
          - focus-metavariable: $Y
    pattern-sanitizers:
      - pattern: analyzerbugs.SanitizerOverloadBug.Helper.singleOverload(...)
      - pattern: analyzerbugs.SanitizerOverloadBug.Helper.multiOverload(...)
