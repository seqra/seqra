rules:
  - id: files-writeString-bug
    languages:
      - java
    severity: ERROR
    message: tainted path reaches Files sink
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: $X = src();
          - focus-metavariable: $X
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: java.nio.file.Files.readAllBytes($F, ...)
              - pattern: java.nio.file.Files.writeString($F, ...)
          - focus-metavariable: $F
